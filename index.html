<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookPad v7.1</title>

<style>

body{
font-family:sans-serif;
background:#081226;
color:white;
padding:20px;
}

.panel{
background:#16233d;
padding:16px;
border-radius:12px;
margin-bottom:14px;
}

button{
padding:12px;
border-radius:8px;
border:none;
background:#31435f;
color:white;
margin:4px;
}

.wave{
width:100%;
background:#0f1b33;
border-radius:10px;
}

</style>
</head>

<body>

<h1>HookPad v7.1</h1>

<div class="panel">

<button id="recordBtn">録音</button>
<button id="stopBtn">停止</button>

<br><br>

BPM
<input id="bpm" value="120">

トリム
<input id="trim" value="2.4">

<audio id="player" controls></audio>

</div>

<div class="panel">

<h3>波形</h3>

<canvas id="wave" width="900" height="140" class="wave"></canvas>

</div>

<script>

let ctx
let waveform=[]
let duration=0

let drag=false

let trim=document.getElementById("trim")

const canvas=document.getElementById("wave")
const c=canvas.getContext("2d")

canvas.addEventListener("mousedown",e=>{
drag=true
moveTrim(e)
})

canvas.addEventListener("mousemove",e=>{
if(drag) moveTrim(e)
})

canvas.addEventListener("mouseup",()=>drag=false)

canvas.addEventListener("touchstart",e=>{
drag=true
moveTrim(e.touches[0])
})

canvas.addEventListener("touchmove",e=>{
moveTrim(e.touches[0])
})

canvas.addEventListener("touchend",()=>drag=false)

function moveTrim(e){

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left

let sec=(x/canvas.width)*duration

trim.value=sec.toFixed(2)

draw()

}

function draw(){

c.clearRect(0,0,canvas.width,canvas.height)

let mid=canvas.height/2

for(let i=0;i<waveform.length;i++){

let x=(i/waveform.length)*canvas.width

let h=waveform[i]*50

c.beginPath()

c.moveTo(x,mid-h)
c.lineTo(x,mid+h)

c.strokeStyle="#3bb7ff"

c.stroke()

}

let trimX=(trim.value/duration)*canvas.width

c.strokeStyle="yellow"

c.beginPath()

c.moveTo(trimX,0)
c.lineTo(trimX,canvas.height)

c.stroke()

}

async function decode(blob){

let ac=new AudioContext()

let buf=await blob.arrayBuffer()

let audio=await ac.decodeAudioData(buf)

let data=audio.getChannelData(0)

duration=audio.duration

let step=Math.floor(data.length/900)

waveform=[]

for(let i=0;i<900;i++){

let sum=0

for(let j=0;j<step;j++){

sum+=Math.abs(data[i*step+j])

}

waveform.push(sum/step)

}

draw()

}

let rec

document.getElementById("recordBtn").onclick=async()=>{

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

rec=new MediaRecorder(stream)

let chunks=[]

rec.ondataavailable=e=>chunks.push(e.data)

rec.onstop=async()=>{

let blob=new Blob(chunks)

document.getElementById("player").src=URL.createObjectURL(blob)

decode(blob)

}

rec.start()

}

document.getElementById("stopBtn").onclick=()=>{

rec.stop()

}

</script>

</body>
</html>
