<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSketch</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

button{
padding:20px;
font-size:20px;
border-radius:12px;
border:none;
background:#ef4444;
color:white;
width:100%;
}

input{
padding:10px;
font-size:16px;
margin-top:10px;
}
</style>

</head>

<body>

<h2>フック録音</h2>

<button id="rec">🎤 RECORD</button>

<br><br>

BPM
<input type="number" value="110">

<script>

let recorder
let stream

const btn=document.getElementById("rec")

btn.onclick=async()=>{

if(!recorder){

stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

recorder.start()

btn.textContent="⏹ STOP"

}else{

recorder.stop()

btn.textContent="🎤 RECORD"

recorder=null

}

}

</script>

</body>
</html>
