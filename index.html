<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HookPad v11 - recording click + advanced chords</title>
<style>
:root{
  --bg:#081226;
  --panel:#0f1b33;
  --panel2:#182640;
  --line:#31435f;
  --text:#e8eefc;
  --muted:#9fb0d1;
  --accent:#3bb7ff;
  --accent2:#8dd7ff;
  --ok:#38d39f;
  --warn:#ffc857;
  --danger:#ff6b6b;
  --violet:#b991ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.app{
  max-width:1320px;
  margin:0 auto;
  padding:16px;
}
.panel{
  background:rgba(15,27,51,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:end;
  margin-bottom:12px;
}
button, select, input{
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  font:inherit;
}
button{ cursor:pointer; }
button:hover{ border-color:var(--accent); }
button.primary{
  background:linear-gradient(180deg,#1a6fb6,#165894);
  border-color:#2f8fe0;
}
button.ok{
  background:linear-gradient(180deg,#19986f,#147858);
  border-color:#36c394;
}
button.warn{
  background:linear-gradient(180deg,#b98b17,#8f6b12);
  border-color:#e0b545;
}
button.danger{
  background:linear-gradient(180deg,#b94848,#8c3636);
  border-color:#df7070;
}
button.slim{
  padding:8px 10px;
  border-radius:10px;
}
button.active{
  border-color:var(--accent2);
  box-shadow:0 0 0 2px rgba(141,215,255,.12);
}
.row{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:12px;
}
@media (max-width:1040px){
  .row{ grid-template-columns:1fr; }
}
.side{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.info{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}
label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}
.stat{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  font-size:14px;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.stat:last-child{ border-bottom:none; }
.grid12{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.grid2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.timeline-wrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:16px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
    #0b162b;
}
.timeline{
  position:relative;
  min-height:420px;
  min-width:1080px;
}
.ruler{
  position:sticky;
  top:0;
  z-index:30;
  height:46px;
  background:rgba(13,22,43,.96);
  border-bottom:1px solid var(--line);
}
.chord-lane{
  position:relative;
  height:54px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(185,145,255,.04);
}
.chord-block{
  position:absolute;
  top:8px;
  height:36px;
  border-radius:10px;
  border:1px solid rgba(185,145,255,.45);
  background:linear-gradient(180deg, rgba(185,145,255,.24), rgba(185,145,255,.12));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 10px;
  color:#efe7ff;
  font-size:13px;
  white-space:nowrap;
  overflow:hidden;
}
.track{
  position:relative;
  height:110px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.03) 0px,
      rgba(255,255,255,.03) 1px,
      transparent 1px,
      transparent calc(var(--beatPx) - 1px)
    );
}
.track:nth-child(even){ background-color:rgba(255,255,255,.01); }
.measure-line{
  position:absolute;
  top:0;
  bottom:0;
  width:1px;
  background:rgba(141,215,255,.25);
}
.measure-label{
  position:absolute;
  top:6px;
  transform:translateX(6px);
  font-size:12px;
  color:var(--accent2);
}
.beat-sub-line{
  position:absolute;
  top:0;
  bottom:0;
  width:1px;
  background:rgba(255,255,255,.07);
}
.playhead{
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:#ff6b6b;
  z-index:50;
  box-shadow:0 0 12px rgba(255,107,107,.6);
  pointer-events:none;
}
.playhead::before{
  content:"";
  position:absolute;
  top:0;
  left:-5px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#ff6b6b;
}
.clip{
  position:absolute;
  top:14px;
  height:82px;
  border-radius:14px;
  overflow:hidden;
  border:2px solid rgba(59,183,255,.45);
  background:linear-gradient(180deg, rgba(59,183,255,.22), rgba(59,183,255,.12));
  box-shadow:0 6px 18px rgba(0,0,0,.22);
  cursor:grab;
  user-select:none;
}
.clip.selected{
  border-color:var(--ok);
  box-shadow:0 0 0 2px rgba(56,211,159,.18), 0 8px 22px rgba(0,0,0,.3);
}
.clip.dragging{ cursor:grabbing; opacity:.9; }
.clip-header{
  position:absolute;
  left:10px;
  top:6px;
  right:10px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
  color:#dff3ff;
  z-index:2;
  pointer-events:none;
}
.wave{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
.handle{
  position:absolute;
  top:0;
  width:10px;
  height:100%;
  z-index:3;
}
.handle.left{ left:0; cursor:ew-resize; }
.handle.right{ right:0; cursor:ew-resize; }
.ghost{
  position:absolute;
  top:14px;
  height:82px;
  border-radius:14px;
  border:2px dashed rgba(255,255,255,.4);
  background:rgba(255,255,255,.08);
  pointer-events:none;
  z-index:20;
}
.track-name{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:12px;
  color:var(--muted);
  pointer-events:none;
}
.footer-note{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}
.kbd{
  display:inline-block;
  padding:2px 6px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#14233d;
  font-size:12px;
}
.current-chord{
  font-size:24px;
  font-weight:700;
  letter-spacing:.02em;
  color:#efe7ff;
  line-height:1.3;
  word-break:break-word;
}
.chord-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border:1px solid rgba(185,145,255,.35);
  background:rgba(185,145,255,.10);
  border-radius:999px;
  font-size:13px;
}
.chip button{
  padding:3px 7px;
  font-size:12px;
  border-radius:999px;
}
.small{
  font-size:12px;
  color:var(--muted);
}
.check-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.check-item{
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:10px;
  background:rgba(255,255,255,.03);
  font-size:13px;
}
.check-item input{
  margin:0;
  padding:0;
}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <div class="toolbar">
      <button id="recBtn" class="danger">● 録音</button>
      <button id="stopBtn" class="warn">■ 停止</button>
      <button id="playBtn" class="primary">▶ 再生</button>
      <button id="pauseBtn">⏸ 一時停止</button>
      <button id="deleteBtn">選択クリップ削除</button>
      <button id="clickBtn" class="slim">♪ クリック ON</button>

      <div>
        <label for="bpm">BPM</label>
        <input id="bpm" type="number" min="40" max="240" value="120" style="width:90px">
      </div>

      <div>
        <label for="timeSig">拍子</label>
        <select id="timeSig">
          <option value="4/4" selected>4/4</option>
          <option value="3/4">3/4</option>
          <option value="6/8">6/8</option>
          <option value="5/4">5/4</option>
          <option value="7/8">7/8</option>
        </select>
      </div>

      <div>
        <label for="bars">小節数</label>
        <input id="bars" type="number" min="4" max="128" value="16" style="width:90px">
      </div>

      <div>
        <label for="snap">スナップ</label>
        <select id="snap">
          <option value="1">1拍</option>
          <option value="0.5">1/2拍</option>
          <option value="0.25">1/4拍</option>
          <option value="0.125">1/8拍</option>
          <option value="0">なし</option>
        </select>
      </div>

      <div>
        <label for="zoom">ズーム</label>
        <input id="zoom" type="range" min="40" max="180" value="80">
      </div>
    </div>

    <div class="row">
      <div class="side">
        <div class="panel" style="padding:12px;">
          <div class="stat"><span>状態</span><strong id="statusText">待機中</strong></div>
          <div class="stat"><span>現在位置</span><strong id="posText">1:1</strong></div>
          <div class="stat"><span>拍子</span><strong id="sigText">4/4</strong></div>
          <div class="stat"><span>クリック</span><strong id="clickText">ON</strong></div>
          <div class="stat"><span>選択クリップ</span><strong id="selText">なし</strong></div>
          <div class="stat"><span>録音数</span><strong id="countText">0</strong></div>
          <div class="stat"><span>現在コード</span><strong id="currentChordMini">-</strong></div>
        </div>

        <div class="panel" style="padding:12px;">
          <div class="small">コードビルダー</div>
          <div class="current-chord" id="currentChordDisplay">C</div>

          <div class="grid2" style="margin-top:10px;">
            <div>
              <label for="rootSelect">Root</label>
              <select id="rootSelect"></select>
            </div>
            <div>
              <label for="qualitySelect">Quality</label>
              <select id="qualitySelect"></select>
            </div>
            <div>
              <label for="bassSelect">Bass / On Chord</label>
              <select id="bassSelect"></select>
            </div>
            <div>
              <label for="extensionSelect">Extension</label>
              <select id="extensionSelect"></select>
            </div>
          </div>

          <label style="margin-top:12px;">Tension / Alter</label>
          <div class="check-grid" id="tensionGrid"></div>

          <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
            <button id="addChordBtn" class="ok slim">＋ コード追加</button>
            <button id="deleteChordBtn" class="slim">最後のコード削除</button>
            <button id="clearChordBtn" class="slim">コード全消し</button>
          </div>

          <div class="chord-list" id="chordList"></div>
        </div>

        <div class="panel" style="padding:12px;">
          <div class="info">
            使い方<br>
            ・<span class="kbd">クリック ON</span>で再生/録音時にメトロノーム<br>
            ・拍子は 3/4、6/8 など切替可能<br>
            ・録音してクリップを作る<br>
            ・クリップ選択後、再生ヘッド位置にコード追加<br>
            ・オンコードや add9、11、13、m7-5 なども指定可能
          </div>
        </div>
      </div>

      <div class="timeline-wrap" id="timelineWrap">
        <div id="timeline" class="timeline">
          <div id="ruler" class="ruler"></div>
          <div id="chordLane" class="chord-lane"></div>
          <div class="track" data-track="0"><div class="track-name">Track 1</div></div>
          <div class="track" data-track="1"><div class="track-name">Track 2</div></div>
          <div class="track" data-track="2"><div class="track-name">Track 3</div></div>
          <div id="playhead" class="playhead"></div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      v11: 録音クリック対応。拡張コード、テンション、オンコード、m7-5、dim7、aug などに対応。
    </div>
  </div>
</div>

<script>
(() => {
const AudioContextClass = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContextClass();

const NOTES = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
const QUALITY_OPTIONS = [
  { value:"maj", label:"maj" },
  { value:"m", label:"m" },
  { value:"7", label:"7" },
  { value:"maj7", label:"maj7" },
  { value:"m7", label:"m7" },
  { value:"m7b5", label:"m7-5" },
  { value:"dim", label:"dim" },
  { value:"dim7", label:"dim7" },
  { value:"aug", label:"aug" },
  { value:"6", label:"6" },
  { value:"m6", label:"m6" },
  { value:"sus2", label:"sus2" },
  { value:"sus4", label:"sus4" },
  { value:"7sus4", label:"7sus4" }
];
const EXTENSION_OPTIONS = [
  { value:"", label:"なし" },
  { value:"9", label:"9" },
  { value:"11", label:"11" },
  { value:"13", label:"13" },
  { value:"maj9", label:"maj9" },
  { value:"maj13", label:"maj13" },
  { value:"m9", label:"m9" },
  { value:"m11", label:"m11" },
  { value:"m13", label:"m13" }
];
const TENSION_OPTIONS = [
  "add9","b9","#9","11","#11","b13","13"
];

const TIME_SIGNATURES = {
  "4/4": { beatsPerBar: 4, beatUnit: 4, clickGroup: [1,0,0,0] },
  "3/4": { beatsPerBar: 3, beatUnit: 4, clickGroup: [1,0,0] },
  "6/8": { beatsPerBar: 6, beatUnit: 8, clickGroup: [1,0,0,1,0,0] },
  "5/4": { beatsPerBar: 5, beatUnit: 4, clickGroup: [1,0,0,0,0] },
  "7/8": { beatsPerBar: 7, beatUnit: 8, clickGroup: [1,0,0,1,0,0,0] }
};

const state = {
  bpm:120,
  timeSig:"4/4",
  beatsPerBar:4,
  beatUnit:4,
  bars:16,
  beatPx:80,
  trackTopOffset:100,
  trackHeight:110,
  clips:[],
  selectedClipId:null,
  isRecording:false,
  isPlaying:false,
  mediaRecorder:null,
  recChunks:[],
  currentSongTime:0,
  playStartAudioTime:0,
  playStartSongTime:0,
  rafId:null,
  drag:null,
  clickEnabled:true,
  clickNodes:[],
  chordBuilder:{
    root:"C",
    quality:"maj",
    bass:"",
    extension:"",
    tensions:[]
  }
};

const els = {
  timelineWrap:document.getElementById("timelineWrap"),
  timeline:document.getElementById("timeline"),
  ruler:document.getElementById("ruler"),
  chordLane:document.getElementById("chordLane"),
  playhead:document.getElementById("playhead"),
  recBtn:document.getElementById("recBtn"),
  stopBtn:document.getElementById("stopBtn"),
  playBtn:document.getElementById("playBtn"),
  pauseBtn:document.getElementById("pauseBtn"),
  deleteBtn:document.getElementById("deleteBtn"),
  clickBtn:document.getElementById("clickBtn"),
  bpm:document.getElementById("bpm"),
  timeSig:document.getElementById("timeSig"),
  bars:document.getElementById("bars"),
  snap:document.getElementById("snap"),
  zoom:document.getElementById("zoom"),
  statusText:document.getElementById("statusText"),
  posText:document.getElementById("posText"),
  sigText:document.getElementById("sigText"),
  clickText:document.getElementById("clickText"),
  selText:document.getElementById("selText"),
  countText:document.getElementById("countText"),
  currentChordDisplay:document.getElementById("currentChordDisplay"),
  currentChordMini:document.getElementById("currentChordMini"),
  rootSelect:document.getElementById("rootSelect"),
  qualitySelect:document.getElementById("qualitySelect"),
  bassSelect:document.getElementById("bassSelect"),
  extensionSelect:document.getElementById("extensionSelect"),
  tensionGrid:document.getElementById("tensionGrid"),
  addChordBtn:document.getElementById("addChordBtn"),
  deleteChordBtn:document.getElementById("deleteChordBtn"),
  clearChordBtn:document.getElementById("clearChordBtn"),
  chordList:document.getElementById("chordList"),
  tracks:[...document.querySelectorAll(".track")]
};

function applyTimeSignature(){
  const cfg = TIME_SIGNATURES[state.timeSig];
  state.beatsPerBar = cfg.beatsPerBar;
  state.beatUnit = cfg.beatUnit;
}

function secPerBeat(){
  if (state.beatUnit === 8) return 30 / state.bpm;
  return 60 / state.bpm;
}
function beatsToPx(b){ return b * state.beatPx; }
function pxToBeats(px){ return px / state.beatPx; }
function songDurationSec(){ return state.bars * state.beatsPerBar * secPerBeat(); }
function timeToX(sec){ return beatsToPx(sec / secPerBeat()); }
function xToTime(x){ return pxToBeats(x) * secPerBeat(); }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
function snapBeats(v){
  const s = parseFloat(els.snap.value);
  return s ? Math.round(v/s) * s : v;
}
function snapTime(sec){
  return snapBeats(sec / secPerBeat()) * secPerBeat();
}
function formatPos(sec){
  const totalBeats = sec / secPerBeat();
  const bar = Math.floor(totalBeats / state.beatsPerBar) + 1;
  const beat = Math.floor(totalBeats % state.beatsPerBar) + 1;
  return `${bar}:${beat}`;
}
function setStatus(txt){ els.statusText.textContent = txt; }
function selectedClip(){ return state.clips.find(c => c.id === state.selectedClipId) || null; }

function formatChord(ch){
  if (!ch) return "-";
  let text = ch.root;

  if (ch.extension) {
    text += ch.extension;
  } else {
    if (ch.quality === "maj") text += "";
    else if (ch.quality === "m7b5") text += "m7-5";
    else text += ch.quality;
  }

  if (ch.extension) {
    const needsBaseQuality =
      ["maj9","maj13","m9","m11","m13"].indexOf(ch.extension) >= 0;

    if (needsBaseQuality) {
      text = ch.root + ch.extension;
    } else if (["9","11","13"].indexOf(ch.extension) >= 0) {
      if (ch.quality === "maj") text = ch.root + ch.extension;
      else if (ch.quality === "m") text = ch.root + "m" + ch.extension;
      else if (ch.quality === "7") text = ch.root + ch.extension;
      else if (ch.quality === "maj7") text = ch.root + "maj7(" + ch.extension + ")";
      else if (ch.quality === "m7") text = ch.root + "m7(" + ch.extension + ")";
      else if (ch.quality === "m7b5") text = ch.root + "m7-5(" + ch.extension + ")";
      else text = ch.root + ch.quality + "(" + ch.extension + ")";
    }
  }

  if (ch.tensions && ch.tensions.length) {
    const tensions = [...ch.tensions].sort();
    const body = tensions.join(",");
    if (text.includes("(")) {
      text = text.replace(/\)$/, "," + body + ")");
    } else {
      text += "(" + body + ")";
    }
  }

  if (ch.bass) text += "/" + ch.bass;
  return text;
}

function currentChordAt(sec){
  const clip = state.clips.find(c => sec >= c.startTime && sec < c.startTime + c.duration);
  if (!clip || !clip.chords.length) return "-";
  const rel = sec - clip.startTime;
  let hit = null;
  for (const ch of clip.chords){
    if (ch.time <= rel) hit = ch;
    else break;
  }
  return formatChord(hit);
}

function updateReadout(){
  els.posText.textContent = formatPos(state.currentSongTime);
  els.sigText.textContent = state.timeSig;
  els.clickText.textContent = state.clickEnabled ? "ON" : "OFF";
  els.clickBtn.textContent = state.clickEnabled ? "♪ クリック ON" : "♪ クリック OFF";
  els.clickBtn.classList.toggle("active", state.clickEnabled);
  const sel = selectedClip();
  els.selText.textContent = sel ? sel.name : "なし";
  els.countText.textContent = String(state.clips.length);
  els.currentChordMini.textContent = currentChordAt(state.currentSongTime);
}

function initChordBuilder(){
  NOTES.forEach(n => {
    const o = document.createElement("option");
    o.value = n;
    o.textContent = n;
    els.rootSelect.appendChild(o);
  });

  QUALITY_OPTIONS.forEach(q => {
    const o = document.createElement("option");
    o.value = q.value;
    o.textContent = q.label;
    els.qualitySelect.appendChild(o);
  });

  const bassNone = document.createElement("option");
  bassNone.value = "";
  bassNone.textContent = "なし";
  els.bassSelect.appendChild(bassNone);
  NOTES.forEach(n => {
    const o = document.createElement("option");
    o.value = n;
    o.textContent = n;
    els.bassSelect.appendChild(o);
  });

  EXTENSION_OPTIONS.forEach(ex => {
    const o = document.createElement("option");
    o.value = ex.value;
    o.textContent = ex.label;
    els.extensionSelect.appendChild(o);
  });

  TENSION_OPTIONS.forEach(t => {
    const label = document.createElement("label");
    label.className = "check-item";
    label.innerHTML = `<input type="checkbox" value="${t}"><span>${t}</span>`;
    els.tensionGrid.appendChild(label);
  });

  els.rootSelect.value = state.chordBuilder.root;
  els.qualitySelect.value = state.chordBuilder.quality;
  els.bassSelect.value = state.chordBuilder.bass;
  els.extensionSelect.value = state.chordBuilder.extension;

  const sync = () => {
    state.chordBuilder.root = els.rootSelect.value;
    state.chordBuilder.quality = els.qualitySelect.value;
    state.chordBuilder.bass = els.bassSelect.value;
    state.chordBuilder.extension = els.extensionSelect.value;
    state.chordBuilder.tensions = [...els.tensionGrid.querySelectorAll("input:checked")].map(i => i.value);
    renderBuilderPreview();
  };

  els.rootSelect.addEventListener("change", sync);
  els.qualitySelect.addEventListener("change", sync);
  els.bassSelect.addEventListener("change", sync);
  els.extensionSelect.addEventListener("change", sync);
  els.tensionGrid.addEventListener("change", sync);

  renderBuilderPreview();
}

function renderBuilderPreview(){
  els.currentChordDisplay.textContent = formatChord({
    root: state.chordBuilder.root,
    quality: state.chordBuilder.quality,
    bass: state.chordBuilder.bass,
    extension: state.chordBuilder.extension,
    tensions: state.chordBuilder.tensions
  });
}

function updateTimelineSize(){
  state.bpm = Number(els.bpm.value) || 120;
  state.timeSig = els.timeSig.value;
  state.bars = Number(els.bars.value) || 16;
  state.beatPx = Number(els.zoom.value) || 80;
  applyTimeSignature();

  const totalBeats = state.bars * state.beatsPerBar;
  els.timeline.style.setProperty("--beatPx", `${state.beatPx}px`);
  els.timeline.style.width = `${beatsToPx(totalBeats)}px`;

  renderRuler();
  renderAll();
  updatePlayhead();
  updateReadout();
}

function renderRuler(){
  els.ruler.innerHTML = "";
  for(let bar=0; bar<=state.bars; bar++){
    const x = beatsToPx(bar * state.beatsPerBar);

    const line = document.createElement("div");
    line.className = "measure-line";
    line.style.left = `${x}px`;
    els.ruler.appendChild(line);

    if(bar < state.bars){
      const label = document.createElement("div");
      label.className = "measure-label";
      label.style.left = `${x}px`;
      label.textContent = `${bar + 1}`;
      els.ruler.appendChild(label);

      for(let beat=1; beat<state.beatsPerBar; beat++){
        const bx = beatsToPx(bar * state.beatsPerBar + beat);
        const sub = document.createElement("div");
        sub.className = "beat-sub-line";
        sub.style.left = `${bx}px`;
        els.ruler.appendChild(sub);
      }
    }
  }
}

function clearTrackDecorations(){
  els.chordLane.innerHTML = "";
  els.tracks.forEach(track => {
    [...track.querySelectorAll(".measure-line,.beat-sub-line,.clip,.ghost")].forEach(el => el.remove());
  });
}

function renderGridLines(){
  for(let bar=0; bar<=state.bars; bar++){
    const x = beatsToPx(bar * state.beatsPerBar);

    const cl = document.createElement("div");
    cl.className = "measure-line";
    cl.style.left = `${x}px`;
    els.chordLane.appendChild(cl);

    els.tracks.forEach(track => {
      const tl = document.createElement("div");
      tl.className = "measure-line";
      tl.style.left = `${x}px`;
      track.appendChild(tl);
    });

    if(bar < state.bars){
      for(let beat=1; beat<state.beatsPerBar; beat++){
        const bx = beatsToPx(bar * state.beatsPerBar + beat);

        const csub = document.createElement("div");
        csub.className = "beat-sub-line";
        csub.style.left = `${bx}px`;
        els.chordLane.appendChild(csub);

        els.tracks.forEach(track => {
          const sub = document.createElement("div");
          sub.className = "beat-sub-line";
          sub.style.left = `${bx}px`;
          track.appendChild(sub);
        });
      }
    }
  }
}

function renderAll(){
  clearTrackDecorations();
  renderGridLines();
  state.clips.forEach(renderClip);
  renderChordLane();
  renderChordList();
}

function renderChordLane(){
  const blocks = [];
  state.clips.forEach(clip => {
    if(!clip.chords.length) return;
    for(let i=0;i<clip.chords.length;i++){
      const start = clip.startTime + clip.chords[i].time;
      const end = i < clip.chords.length - 1
        ? clip.startTime + clip.chords[i+1].time
        : clip.startTime + clip.duration;
      blocks.push({ label: formatChord(clip.chords[i]), start, end });
    }
  });

  blocks.forEach(b => {
    const el = document.createElement("div");
    el.className = "chord-block";
    el.style.left = `${timeToX(b.start)}px`;
    el.style.width = `${Math.max(52, timeToX(b.end - b.start))}px`;
    el.textContent = b.label;
    els.chordLane.appendChild(el);
  });
}

function renderChordList(){
  els.chordList.innerHTML = "";
  const clip = selectedClip();

  if(!clip){
    const p = document.createElement("div");
    p.className = "small";
    p.textContent = "クリップを選ぶと、そのクリップに貼ったコードがここに並ぶ。";
    els.chordList.appendChild(p);
    return;
  }

  if(!clip.chords.length){
    const p = document.createElement("div");
    p.className = "small";
    p.textContent = "まだコードなし。再生位置をクリップ内に置いて追加。";
    els.chordList.appendChild(p);
    return;
  }

  clip.chords.forEach((ch, idx) => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.innerHTML = `<span>${formatChord(ch)}</span><span class="small">${formatPos(clip.startTime + ch.time)}</span>`;

    const del = document.createElement("button");
    del.textContent = "×";
    del.onclick = () => {
      clip.chords.splice(idx, 1);
      clip.chords.sort((a,b) => a.time - b.time);
      renderAll();
      updateReadout();
    };

    chip.appendChild(del);
    els.chordList.appendChild(chip);
  });
}

function renderClip(clip){
  const trackEl = els.tracks[clip.track];
  if(!trackEl) return;

  let el = trackEl.querySelector(`.clip[data-id="${clip.id}"]`);
  if(!el){
    el = document.createElement("div");
    el.className = "clip";
    el.dataset.id = clip.id;
    el.innerHTML = `
      <div class="clip-header">
        <span class="clip-title"></span>
        <span class="clip-len"></span>
      </div>
      <canvas class="wave"></canvas>
      <div class="handle left"></div>
      <div class="handle right"></div>
    `;
    trackEl.appendChild(el);

    el.addEventListener("pointerdown", onClipPointerDown);
    el.addEventListener("click", e => {
      e.stopPropagation();
      selectClip(clip.id);
    });
  }

  el.classList.toggle("selected", clip.id === state.selectedClipId);
  el.style.left = `${timeToX(clip.startTime)}px`;
  el.style.width = `${Math.max(24, timeToX(clip.duration))}px`;
  el.querySelector(".clip-title").textContent =
    clip.name + (clip.chords.length ? ` · ${formatChord(clip.chords[0])}` : "");
  el.querySelector(".clip-len").textContent = `${clip.duration.toFixed(2)}s`;
  drawWaveform(el.querySelector(".wave"), clip.wavePeaks);
}

function drawWaveform(canvas, peaks){
  const dpr = devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width));
  const h = Math.max(1, Math.floor(rect.height));

  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);

  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "rgba(255,255,255,.06)";
  ctx.fillRect(0,0,w,h);

  if(!peaks || !peaks.length) return;

  ctx.strokeStyle = "rgba(210,241,255,.9)";
  ctx.lineWidth = 1;
  const mid = h / 2;
  const step = peaks.length / w;

  ctx.beginPath();
  for(let x=0;x<w;x++){
    const idx = Math.floor(x * step);
    const amp = peaks[idx] || 0;
    const y1 = mid - amp * (h * .42);
    const y2 = mid + amp * (h * .42);
    ctx.moveTo(x + .5, y1);
    ctx.lineTo(x + .5, y2);
  }
  ctx.stroke();
}

function selectClip(id){
  state.selectedClipId = id;
  renderAll();
  updateReadout();
}

async function startRecording(){
  if(state.isRecording) return;

  await audioCtx.resume();
  state.currentSongTime = state.currentSongTime || 0;

  scheduleClickTrack(state.currentSongTime);

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const mr = new MediaRecorder(stream);

  state.mediaRecorder = mr;
  state.recChunks = [];
  state.isRecording = true;
  state.playStartAudioTime = audioCtx.currentTime;
  state.playStartSongTime = state.currentSongTime;

  mr.ondataavailable = e => {
    if(e.data.size > 0) state.recChunks.push(e.data);
  };

  mr.onstop = async () => {
    const blob = new Blob(state.recChunks, {type:"audio/webm"});
    const arr = await blob.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arr.slice(0));
    const duration = decoded.duration;
    const peaks = makePeaks(decoded, 1000);

    const clip = {
      id: crypto.randomUUID(),
      name: `Take ${state.clips.length + 1}`,
      track: 0,
      startTime: state.playStartSongTime,
      offset: 0,
      duration,
      sourceDuration: duration,
      buffer: decoded,
      wavePeaks: peaks,
      source: null,
      chords: []
    };

    state.clips.push(clip);
    selectClip(clip.id);
    renderAll();
    updateReadout();
    stream.getTracks().forEach(t => t.stop());
  };

  mr.start();
  tickRecording();
  setStatus("録音中");
}

function tickRecording(){
  if(!state.isRecording) return;
  const elapsed = audioCtx.currentTime - state.playStartAudioTime;
  state.currentSongTime = state.playStartSongTime + elapsed;
  if(state.currentSongTime >= songDurationSec()){
    stopRecording();
    setStatus("停止");
    return;
  }
  updatePlayhead();
  updateReadout();
  state.rafId = requestAnimationFrame(tickRecording);
}

function stopRecording(){
  if(!state.isRecording || !state.mediaRecorder) return;
  state.isRecording = false;
  cancelAnimationFrame(state.rafId);
  stopClickNodes();
  state.mediaRecorder.stop();
  setStatus("停止");
}

function makePeaks(audioBuffer, size=1000){
  const channel = audioBuffer.getChannelData(0);
  const block = Math.max(1, Math.floor(channel.length / size));
  const peaks = [];
  for(let i=0;i<size;i++){
    let start = i * block;
    let end = Math.min(channel.length, start + block);
    let max = 0;
    for(let j=start;j<end;j++){
      const v = Math.abs(channel[j]);
      if(v > max) max = v;
    }
    peaks.push(max);
  }
  return peaks;
}

function stopClickNodes(){
  state.clickNodes.forEach(node => {
    try { node.stop(); } catch {}
    try { node.disconnect(); } catch {}
  });
  state.clickNodes = [];
}

function scheduleClickTrack(songStartTime){
  stopClickNodes();
  if(!state.clickEnabled) return;

  const cfg = TIME_SIGNATURES[state.timeSig];
  const totalBeats = state.bars * state.beatsPerBar;
  const currentBeatPos = songStartTime / secPerBeat();
  const startBeatIndex = Math.floor(currentBeatPos);

  for(let beatIndex = startBeatIndex; beatIndex < totalBeats; beatIndex++){
    const beatTime = beatIndex * secPerBeat();
    const relWhen = beatTime - songStartTime;
    if(relWhen < -0.0001) continue;

    const beatInBar = beatIndex % state.beatsPerBar;
    const isAccent = !!cfg.clickGroup[beatInBar];

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = isAccent ? 1400 : 950;

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + Math.max(0, relWhen));
    gain.gain.exponentialRampToValueAtTime(isAccent ? 0.22 : 0.12, audioCtx.currentTime + Math.max(0, relWhen) + 0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + Math.max(0, relWhen) + (isAccent ? 0.05 : 0.035));

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime + Math.max(0, relWhen));
    osc.stop(audioCtx.currentTime + Math.max(0, relWhen) + 0.06);

    state.clickNodes.push(osc);
  }
}

function stopPlayback(){
  state.clips.forEach(c => {
    if(c.source){
      try{ c.source.stop(); }catch{}
      c.source.disconnect();
      c.source = null;
    }
  });
  stopClickNodes();
  state.isPlaying = false;
  cancelAnimationFrame(state.rafId);
}

function playFromCurrent(){
  stopPlayback();
  state.isPlaying = true;
  state.playStartAudioTime = audioCtx.currentTime;
  state.playStartSongTime = state.currentSongTime;

  scheduleClickTrack(state.currentSongTime);

  state.clips.forEach(clip => {
    const clipEnd = clip.startTime + clip.duration;
    if(clipEnd <= state.currentSongTime) return;

    const src = audioCtx.createBufferSource();
    src.buffer = clip.buffer;
    src.connect(audioCtx.destination);

    const songNow = state.currentSongTime;
    const when = Math.max(0, clip.startTime - songNow);
    let offset = clip.offset;
    let playDur = clip.duration;

    if(songNow > clip.startTime){
      const passed = songNow - clip.startTime;
      offset += passed;
      playDur -= passed;
    }

    if(playDur > 0){
      src.start(audioCtx.currentTime + when, offset, playDur);
      clip.source = src;
    }
  });

  tickPlayback();
  setStatus("再生中");
}

function tickPlayback(){
  if(!state.isPlaying) return;

  const elapsed = audioCtx.currentTime - state.playStartAudioTime;
  state.currentSongTime = state.playStartSongTime + elapsed;

  if(state.currentSongTime >= songDurationSec()){
    state.currentSongTime = songDurationSec();
    updatePlayhead();
    updateReadout();
    stopPlayback();
    setStatus("停止");
    return;
  }

  updatePlayhead();
  updateReadout();
  state.rafId = requestAnimationFrame(tickPlayback);
}

function updatePlayhead(){
  els.playhead.style.left = `${timeToX(state.currentSongTime)}px`;
}

function deleteSelected(){
  if(!state.selectedClipId) return;
  state.clips = state.clips.filter(c => c.id !== state.selectedClipId);
  state.selectedClipId = null;
  renderAll();
  updateReadout();
}

function addChordToSelectedContext(){
  const clip = selectedClip();
  if(!clip) return alert("先にクリップを1つ選んでね。");

  const rel = clamp(snapTime(state.currentSongTime) - clip.startTime, 0, clip.duration);

  const chord = {
    root: state.chordBuilder.root,
    quality: state.chordBuilder.quality,
    bass: state.chordBuilder.bass,
    extension: state.chordBuilder.extension,
    tensions: [...state.chordBuilder.tensions],
    time: rel
  };

  const existing = clip.chords.find(ch => Math.abs(ch.time - rel) < 0.0001);
  if(existing){
    existing.root = chord.root;
    existing.quality = chord.quality;
    existing.bass = chord.bass;
    existing.extension = chord.extension;
    existing.tensions = chord.tensions;
  }else{
    clip.chords.push(chord);
    clip.chords.sort((a,b) => a.time - b.time);
  }

  renderAll();
  updateReadout();
}

function deleteLastChord(){
  const clip = selectedClip();
  if(!clip || !clip.chords.length) return;
  clip.chords.pop();
  renderAll();
  updateReadout();
}

function clearChords(){
  const clip = selectedClip();
  if(!clip) return;
  clip.chords = [];
  renderAll();
  updateReadout();
}

function pointerToTimeline(e){
  const rect = els.timeline.getBoundingClientRect();
  return {
    x: e.clientX - rect.left + els.timelineWrap.scrollLeft,
    y: e.clientY - rect.top + els.timelineWrap.scrollTop
  };
}

function getTrackIndexFromY(y){
  return clamp(Math.floor((y - state.trackTopOffset) / state.trackHeight), 0, els.tracks.length - 1);
}

function onClipPointerDown(e){
  const clipEl = e.currentTarget;
  const clipId = clipEl.dataset.id;
  const clip = state.clips.find(c => c.id === clipId);
  if(!clip) return;

  selectClip(clip.id);
  const p = pointerToTimeline(e);

  let mode = "move";
  if(e.target.classList.contains("handle")){
    mode = e.target.classList.contains("left") ? "trimL" : "trimR";
  }

  state.drag = {
    clipId,
    mode,
    startX: p.x,
    originStart: clip.startTime,
    originDuration: clip.duration,
    originTrack: clip.track,
    ghost: createGhost(clip)
  };

  clipEl.setPointerCapture(e.pointerId);
  clipEl.classList.add("dragging");

  const move = ev => onClipPointerMove(ev);
  const up = ev => {
    clipEl.releasePointerCapture(ev.pointerId);
    clipEl.classList.remove("dragging");
    clipEl.removeEventListener("pointermove", move);
    clipEl.removeEventListener("pointerup", up);
    clipEl.removeEventListener("pointercancel", up);
    if(state.drag?.ghost) state.drag.ghost.remove();
    state.drag = null;
    renderAll();
  };

  clipEl.addEventListener("pointermove", move);
  clipEl.addEventListener("pointerup", up);
  clipEl.addEventListener("pointercancel", up);
}

function createGhost(clip){
  const trackEl = els.tracks[clip.track];
  const ghost = document.createElement("div");
  ghost.className = "ghost";
  ghost.style.left = `${timeToX(clip.startTime)}px`;
  ghost.style.width = `${Math.max(24, timeToX(clip.duration))}px`;
  trackEl.appendChild(ghost);
  return ghost;
}

function onClipPointerMove(e){
  if(!state.drag) return;
  const clip = state.clips.find(c => c.id === state.drag.clipId);
  if(!clip) return;

  const p = pointerToTimeline(e);
  const dx = p.x - state.drag.startX;
  const dSec = snapBeats(pxToBeats(dx)) * secPerBeat();

  if(state.drag.mode === "move"){
    clip.startTime = clamp(state.drag.originStart + dSec, 0, songDurationSec() - clip.duration);
    clip.track = getTrackIndexFromY(p.y);
  }

  if(state.drag.mode === "trimL"){
    const minDur = .1;
    let newStart = clamp(
      state.drag.originStart + dSec,
      0,
      state.drag.originStart + state.drag.originDuration - minDur
    );
    let diff = newStart - state.drag.originStart;

    clip.startTime = newStart;
    clip.offset = clamp(clip.offset + diff, 0, clip.sourceDuration - minDur);
    clip.duration = clamp(state.drag.originDuration - diff, minDur, clip.sourceDuration - clip.offset);
    clip.chords = clip.chords
      .filter(ch => ch.time <= clip.duration)
      .map(ch => ({...ch, time: Math.max(0, ch.time - diff)}));
  }

  if(state.drag.mode === "trimR"){
    const minDur = .1;
    let newDur = clamp(state.drag.originDuration + dSec, minDur, clip.sourceDuration - clip.offset);
    if(clip.startTime + newDur > songDurationSec()) newDur = songDurationSec() - clip.startTime;
    clip.duration = Math.max(minDur, newDur);
    clip.chords = clip.chords.filter(ch => ch.time <= clip.duration);
  }

  if(state.drag.ghost){
    if(state.drag.mode === "move" && clip.track !== state.drag.originTrack){
      state.drag.ghost.remove();
      state.drag.ghost = createGhost(clip);
      state.drag.originTrack = clip.track;
    }
    state.drag.ghost.style.left = `${timeToX(clip.startTime)}px`;
    state.drag.ghost.style.width = `${Math.max(24, timeToX(clip.duration))}px`;
  }

  renderAll();
  updateReadout();
}

els.timeline.addEventListener("click", e => {
  if(e.target.closest(".clip")) return;
  const p = pointerToTimeline(e);
  state.currentSongTime = clamp(xToTime(p.x), 0, songDurationSec());
  updatePlayhead();
  updateReadout();
});

els.recBtn.addEventListener("click", async () => {
  try{
    await startRecording();
  }catch(err){
    console.error(err);
    setStatus("録音失敗");
    alert("マイクの許可が必要です。");
  }
});

els.stopBtn.addEventListener("click", () => {
  if(state.isRecording) stopRecording();
  stopPlayback();
  setStatus("停止");
});

els.playBtn.addEventListener("click", async () => {
  await audioCtx.resume();
  playFromCurrent();
});

els.pauseBtn.addEventListener("click", () => {
  if(!state.isPlaying) return;
  const elapsed = audioCtx.currentTime - state.playStartAudioTime;
  state.currentSongTime = state.playStartSongTime + elapsed;
  stopPlayback();
  updatePlayhead();
  updateReadout();
  setStatus("一時停止");
});

els.deleteBtn.addEventListener("click", deleteSelected);
els.clickBtn.addEventListener("click", () => {
  state.clickEnabled = !state.clickEnabled;
  updateReadout();
});
els.addChordBtn.addEventListener("click", addChordToSelectedContext);
els.deleteChordBtn.addEventListener("click", deleteLastChord);
els.clearChordBtn.addEventListener("click", clearChords);
els.bpm.addEventListener("input", updateTimelineSize);
els.timeSig.addEventListener("change", updateTimelineSize);
els.bars.addEventListener("input", updateTimelineSize);
els.zoom.addEventListener("input", updateTimelineSize);
window.addEventListener("resize", renderAll);

initChordBuilder();
applyTimeSignature();
updateTimelineSize();
updateReadout();
setStatus("待機中");
})();
</script>
</body>
</html>
