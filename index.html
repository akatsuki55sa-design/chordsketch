<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSketch v5.5</title>
<style>
:root{
  --bg:#081226;
  --panel:#0f1b33;
  --panel2:#182640;
  --line:#31435f;
  --text:#e8eefc;
  --muted:#9fb0d1;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#081226;
  color:var(--text);
}
.app{
  max-width:860px;
  margin:0 auto;
  padding:16px;
}
.panel{
  background:rgba(15,27,51,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}
h1{
  margin:0 0 6px;
  font-size:1.8rem;
}
p{
  margin:0 0 12px;
  color:var(--muted);
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button,input,select,textarea{
  font:inherit;
}
button{
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#1b2b47;
  color:white;
}
button:active{
  transform:scale(.99);
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  color:white;
}
textarea{
  min-height:90px;
}
.timeline{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}
.slot{
  min-width:110px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  text-align:center;
}
.status{
  margin-top:10px;
  padding:10px 12px;
  border-radius:12px;
  background:#182640;
  color:var(--muted);
}
audio{
  width:100%;
  margin-top:10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.grid2{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
@media (max-width:640px){
  .grid,.grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <h1>ChordSketch v5.5</h1>
  <p>4カウント予約再生 + 録音オフセット補正版。</p>

  <div class="panel">
    <h2 style="margin:0 0 12px;">フック録音</h2>

    <div class="row">
      <button id="warmupBtn" type="button">ウォームアップ</button>
      <button id="startRecBtn" type="button">録音開始</button>
      <button id="stopRecBtn" type="button">録音停止</button>
      <button id="downloadRecBtn" type="button">録音を保存</button>
    </div>

    <div class="grid2" style="margin-top:12px;">
      <div>
        <label>曲名 / メモ名</label>
        <input id="projectName" placeholder="例：新曲サビ候補A">
      </div>
      <div>
        <label>BPM</label>
        <input id="bpm" type="number" value="110" min="40" max="240">
      </div>
    </div>

    <div class="grid2" style="margin-top:12px;">
      <div>
        <label>録音再生オフセット（秒）</label>
        <input id="audioOffset" type="number" value="0.12" step="0.01">
      </div>
      <div>
        <label>
          <input id="clickToggle" type="checkbox" checked style="width:auto;margin-right:8px;">
          クリック音を鳴らす
        </label>
      </div>
    </div>

    <div class="status" id="recordStatus">最初にウォームアップ推奨。録音前4カウントあり。</div>
    <audio id="audioPlayer" controls></audio>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード進行</h2>
    <div class="timeline" id="timeline"></div>
    <div class="row">
      <button id="leftBtn" type="button">◀</button>
      <button id="rightBtn" type="button">▶</button>
      <button id="deleteBtn" type="button">⌫</button>
      <button id="addBarsBtn" type="button">+4</button>
      <button id="loopBtn" type="button">LOOP</button>
    </div>
    <div class="status" id="loopStatus">録音が遅れて聞こえる時はオフセット値を少し上げる。</div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード入力</h2>
    <div class="grid">
      <select id="root"></select>
      <select id="type"></select>
      <select id="slash"></select>
    </div>
    <div class="row" style="margin-top:12px;">
      <button id="addChordBtn" type="button">追加</button>
      <button id="previewBtn" type="button">試聴</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">歌詞メモ</h2>
    <textarea id="lyrics" placeholder="仮歌詞 / フレーズ / 連想ワード"></textarea>
  </div>
</div>

<script>
const roots = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
const types = ["","m","7","maj7","m7","sus2","sus4","9","11","add9","aug","dim","m7b5","mM7"];

const rootSel = document.getElementById("root");
const typeSel = document.getElementById("type");
const slashSel = document.getElementById("slash");
const timelineEl = document.getElementById("timeline");
const bpmEl = document.getElementById("bpm");
const audioPlayer = document.getElementById("audioPlayer");
const recordStatus = document.getElementById("recordStatus");
const loopStatus = document.getElementById("loopStatus");
const startRecBtn = document.getElementById("startRecBtn");
const stopRecBtn = document.getElementById("stopRecBtn");
const downloadRecBtn = document.getElementById("downloadRecBtn");
const clickToggle = document.getElementById("clickToggle");
const warmupBtn = document.getElementById("warmupBtn");
const audioOffsetEl = document.getElementById("audioOffset");

const state = {
  slots: ["-","-","-","-"],
  cursor: 0,

  audioCtx: null,
  mediaRecorder: null,
  mediaStream: null,
  recordedChunks: [],
  recordedBlob: null,

  mode: "idle", // idle, countin-record, recording, loop
  barIndex: 0,

  metroTimerId: null,
  metroLookahead: 25.0,
  metroScheduleAheadTime: 0.12,
  metroNextNoteTime: 0.0,
  metroBeatNumber: 0,

  warmedUp: false
};

function buildSelects(){
  roots.forEach(r=>{
    const o = document.createElement("option");
    o.value = r;
    o.textContent = r;
    rootSel.appendChild(o);

    const s = document.createElement("option");
    s.value = r;
    s.textContent = r;
    slashSel.appendChild(s);
  });

  const none = document.createElement("option");
  none.value = "";
  none.textContent = "none";
  slashSel.prepend(none);
  slashSel.value = "";

  types.forEach(t=>{
    const o = document.createElement("option");
    o.value = t;
    o.textContent = t || "major";
    typeSel.appendChild(o);
  });
}

function renderTimeline(){
  timelineEl.innerHTML = "";
  state.slots.forEach((chord, i)=>{
    const div = document.createElement("button");
    div.type = "button";
    div.className = "slot";
    div.textContent = chord + " / " + (i + 1) + "小節目";
    if(i === state.cursor){
      div.style.outline = "2px solid #3bb7ff";
    }
    div.onclick = ()=>{
      state.cursor = i;
      renderTimeline();
    };
    timelineEl.appendChild(div);
  });
}

function currentChordName(){
  const root = rootSel.value;
  const type = typeSel.value;
  const slash = slashSel.value;
  return root + type + (slash ? "/" + slash : "");
}

async function ensureAudio(){
  if(!state.audioCtx){
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(state.audioCtx.state === "suspended"){
    await state.audioCtx.resume();
  }
}

function noteFreq(note){
  const map = {
    C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,
    G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11
  };
  const midi = 60 + map[note];
  return 440 * Math.pow(2, (midi - 69) / 12);
}

async function playChord(root, type){
  await ensureAudio();

  let intervals = [0,4,7];
  if(type === "m") intervals = [0,3,7];
  if(type === "7") intervals = [0,4,7,10];
  if(type === "maj7") intervals = [0,4,7,11];
  if(type === "m7") intervals = [0,3,7,10];
  if(type === "sus2") intervals = [0,2,7];
  if(type === "sus4") intervals = [0,5,7];
  if(type === "dim") intervals = [0,3,6];
  if(type === "aug") intervals = [0,4,8];

  const rootIndex = roots.indexOf(root);
  intervals.forEach(i=>{
    const note = roots[(rootIndex + i) % 12];
    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = noteFreq(note);

    osc.connect(gain);
    gain.connect(state.audioCtx.destination);

    gain.gain.setValueAtTime(0.15, state.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 1);

    osc.start();
    osc.stop(state.audioCtx.currentTime + 1);
  });
}

async function playBass(root){
  await ensureAudio();

  const map = {
    C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,
    G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11
  };
  const midi = 36 + map[root];
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(state.audioCtx.destination);

  gain.gain.setValueAtTime(0.22, state.audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 1.2);

  osc.start();
  osc.stop(state.audioCtx.currentTime + 1.2);
}

function metroSecondsPerBeat(){
  return 60.0 / (Number(bpmEl.value) || 110);
}

function scheduleClick(time, isDownbeat){
  if(!clickToggle.checked || !state.audioCtx) return;

  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = isDownbeat ? 1400 : 1000;

  osc.connect(gain);
  gain.connect(state.audioCtx.destination);

  gain.gain.setValueAtTime(isDownbeat ? 0.35 : 0.22, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);

  osc.start(time);
  osc.stop(time + 0.04);
}

function scheduleCountIn(startTime){
  const beat = metroSecondsPerBeat();
  for(let i = 0; i < 4; i++){
    scheduleClick(startTime + (beat * i), i === 0);
  }
  return startTime + (beat * 4);
}

async function warmupAudioAndMic(){
  if(state.warmedUp){
    recordStatus.textContent = "ウォームアップ済み。";
    return;
  }

  try{
    state.mode = "warming";
    recordStatus.textContent = "ウォームアップ中…";

    await ensureAudio();

    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();
    gain.gain.value = 0.00001;
    osc.connect(gain);
    gain.connect(state.audioCtx.destination);
    osc.start();
    osc.stop(state.audioCtx.currentTime + 0.02);

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t => t.stop());

    state.warmedUp = true;
    state.mode = "idle";
    recordStatus.textContent = "ウォームアップ完了。";
  }catch(e){
    state.mode = "idle";
    recordStatus.textContent = "ウォームアップ失敗。マイク許可を確認してみて。";
  }
}

async function addChordToTimeline(){
  const chord = currentChordName();
  state.slots[state.cursor] = chord;

  const root = chord.match(/^[A-G][b#]?/)[0];
  const type = chord.replace(root, "").split("/")[0];

  await playChord(root, type);
  await playBass(root);

  if(state.cursor < state.slots.length - 1){
    state.cursor++;
  }
  renderTimeline();
}

function deleteChord(){
  state.slots[state.cursor] = "-";
  renderTimeline();
}

function addBars(){
  state.slots.push("-","-","-","-");
  renderTimeline();
}

function moveLeft(){
  state.cursor = Math.max(0, state.cursor - 1);
  renderTimeline();
}

function moveRight(){
  state.cursor = Math.min(state.slots.length - 1, state.cursor + 1);
  renderTimeline();
}

async function playBarByIndex(barIndex){
  const chord = state.slots[barIndex];
  if(chord !== "-"){
    const root = chord.match(/^[A-G][b#]?/)[0];
    const type = chord.replace(root, "").split("/")[0];
    await playChord(root, type);
    await playBass(root);
  }
}

function stopLoop(){
  if(state.metroTimerId){
    clearInterval(state.metroTimerId);
    state.metroTimerId = null;
  }

  state.mode = "idle";
  document.getElementById("loopBtn").textContent = "LOOP";
  loopStatus.textContent = "LOOP停止。";

  if(!audioPlayer.paused){
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
  }

  renderTimeline();
}

async function startLoop(){
  state.mode = "loop";
  state.barIndex = 0;
  document.getElementById("loopBtn").textContent = "STOP LOOP";

  await ensureAudio();

  const beat = metroSecondsPerBeat();
  const barMs = beat * 4 * 1000;
  const now = state.audioCtx.currentTime;
  const startAt = now + 0.12;
  const audioOffset = Number(audioOffsetEl.value) || 0;

  if(clickToggle.checked){
    for(let i = 0; i < 16; i++){
      const beatInBar = i % 4;
      scheduleClick(startAt + (beat * i), beatInBar === 0);
    }
  }

  if(audioPlayer.src){
    try{
      audioPlayer.pause();
      audioPlayer.currentTime = Math.max(0, audioOffset);
      setTimeout(()=>{
        audioPlayer.play().catch(()=>{});
      }, 120);
      loopStatus.textContent = "録音 + コード + クリック同期再生中。";
    }catch(e){
      loopStatus.textContent = "コード + クリック再生中。録音は手動再生が必要かも。";
    }
  }else{
    loopStatus.textContent = "コード + クリック再生中。録音はまだ無し。";
  }

  setTimeout(()=>{
    state.barIndex = 0;
    state.cursor = 0;
    renderTimeline();
    playBarByIndex(0);
  }, 120);

  state.metroTimerId = setInterval(()=>{
    state.barIndex = (state.barIndex + 1) % state.slots.length;
    state.cursor = state.barIndex;
    renderTimeline();
    playBarByIndex(state.barIndex);
  }, barMs);
}

function toggleLoop(){
  if(state.mode === "loop") stopLoop();
  else startLoop();
}

async function startRecording(){
  if(state.mode === "recording" || state.mode === "countin-record") return;

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    recordStatus.textContent = "このブラウザでは録音APIが使えないみたい。";
    return;
  }

  try{
    await ensureAudio();

    recordStatus.textContent = "マイク準備中…";
    state.mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});

    state.recordedChunks = [];
    state.mediaRecorder = new MediaRecorder(state.mediaStream);

    state.mediaRecorder.ondataavailable = (e)=>{
      if(e.data && e.data.size > 0){
        state.recordedChunks.push(e.data);
      }
    };

    state.mediaRecorder.onstop = ()=>{
      state.recordedBlob = new Blob(
        state.recordedChunks,
        { type: state.mediaRecorder.mimeType || "audio/webm" }
      );

      audioPlayer.src = URL.createObjectURL(state.recordedBlob);

      if(state.mediaStream){
        state.mediaStream.getTracks().forEach(t => t.stop());
      }

      state.mediaStream = null;
      state.mediaRecorder = null;
      state.mode = "idle";

      recordStatus.textContent = "録音できた。必要なら「録音を保存」でダウンロード。";
    };

    state.mode = "countin-record";
    recordStatus.textContent = "カウントイン中… 4カウント後に録音開始";

    const startAt = state.audioCtx.currentTime + 0.12;
    const recStartAt = scheduleCountIn(startAt);

    const waitMs = Math.max(0, (recStartAt - state.audioCtx.currentTime) * 1000);

    setTimeout(()=>{
      if(state.mode !== "countin-record" || !state.mediaRecorder) return;
      state.mediaRecorder.start();
      state.mode = "recording";
      recordStatus.textContent = "録音中…「録音停止」で止める。";
    }, waitMs);

  }catch(err){
    state.mode = "idle";

    if(state.mediaStream){
      state.mediaStream.getTracks().forEach(t => t.stop());
      state.mediaStream = null;
    }

    state.mediaRecorder = null;
    recordStatus.textContent = "録音開始に失敗。マイク許可を確認してみて。";
  }
}

function stopRecording(){
  if(state.mode === "countin-record"){
    state.mode = "idle";

    if(state.mediaStream){
      state.mediaStream.getTracks().forEach(t => t.stop());
      state.mediaStream = null;
    }

    state.mediaRecorder = null;
    recordStatus.textContent = "カウントインを停止した。";
    return;
  }

  if(state.mode !== "recording" || !state.mediaRecorder) return;

  recordStatus.textContent = "停止中…";
  state.mediaRecorder.stop();
}

function downloadRecording(){
  if(!state.recordedBlob) return;

  const a = document.createElement("a");
  a.href = URL.createObjectURL(state.recordedBlob);
  a.download = "hook-recording.webm";
  a.click();
}

document.getElementById("addChordBtn").onclick = ()=>{ addChordToTimeline(); };
document.getElementById("previewBtn").onclick = ()=>{ playChord(rootSel.value, typeSel.value); };
document.getElementById("deleteBtn").onclick = deleteChord;
document.getElementById("addBarsBtn").onclick = addBars;
document.getElementById("leftBtn").onclick = moveLeft;
document.getElementById("rightBtn").onclick = moveRight;
document.getElementById("loopBtn").onclick = toggleLoop;

warmupBtn.onclick = warmupAudioAndMic;
startRecBtn.onclick = startRecording;
stopRecBtn.onclick = stopRecording;
downloadRecBtn.onclick = downloadRecording;

rootSel.onchange = ()=>{ playChord(rootSel.value, typeSel.value); };
typeSel.onchange = ()=>{ playChord(rootSel.value, typeSel.value); };
slashSel.onchange = ()=>{ playChord(rootSel.value, typeSel.value); };

buildSelects();
renderTimeline();
</script>
</body>
</html>
