<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HookPad v7.5</title>
<style>
:root{
  --bg:#081226;
  --panel:#0f1b33;
  --panel2:#182640;
  --line:#31435f;
  --text:#e8eefc;
  --muted:#9fb0d1;
  --accent:#3bb7ff;
  --accent2:#8dd7ff;
  --ok:#38d39f;
  --warn:#ffc857;
  --region:rgba(56,211,159,.18);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.app{
  max-width:920px;
  margin:0 auto;
  padding:16px;
}
.panel{
  background:rgba(15,27,51,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}
h1{
  margin:0 0 6px;
  font-size:1.9rem;
}
p{
  margin:0 0 12px;
  color:var(--muted);
}
button,input,select,textarea{
  font:inherit;
}
button{
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#1b2b47;
  color:#fff;
}
button:active{ transform:scale(.99); }
button.ok{
  background:#194734;
  border-color:#2c9f73;
}
button.warn{
  background:#4a3820;
  border-color:#9b6b1d;
}
button.ghost{
  background:#16253f;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  color:#fff;
}
textarea{
  min-height:96px;
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.grid2,.grid3,.grid4{
  display:grid;
  gap:10px;
}
.grid2{ grid-template-columns:repeat(2,minmax(0,1fr)); }
.grid3{ grid-template-columns:repeat(3,minmax(0,1fr)); }
.grid4{ grid-template-columns:repeat(4,minmax(0,1fr)); }

.timeline{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}
.slot{
  min-width:110px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  text-align:center;
  transition:.12s ease;
}
.slot.active{
  outline:2px solid var(--accent);
  box-shadow:0 0 0 2px rgba(59,183,255,.15) inset;
}
.slot.playing{
  background:#213558;
  border-color:var(--accent);
  box-shadow:0 0 18px rgba(59,183,255,.22);
}
.slot.loopRange{
  border-color:var(--warn);
  box-shadow:0 0 0 1px rgba(255,200,87,.35) inset;
}

.status{
  margin-top:10px;
  padding:10px 12px;
  border-radius:12px;
  background:#182640;
  color:var(--muted);
}
.small{
  font-size:.92rem;
  color:var(--muted);
}
audio{
  width:100%;
  margin-top:10px;
}

.beatBox{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.beat{
  flex:1;
  text-align:center;
  padding:12px 0;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  color:var(--muted);
  font-weight:700;
  transition:.08s ease;
}
.beat.on{
  background:var(--accent);
  color:#081226;
  border-color:var(--accent2);
  box-shadow:0 0 18px rgba(59,183,255,.30);
}
.beat.down{
  background:#8dd7ff;
  color:#081226;
}

.waveWrap{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#182640;
  border:1px solid var(--line);
}
.waveHeader{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:8px;
}
.waveHeaderLeft{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.waveTools{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.waveTool{
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#16253f;
}
.waveTool input[type="checkbox"]{
  width:auto;
  margin:0;
}
.waveTool select{
  width:auto;
  min-width:92px;
  padding:8px 10px;
}
.waveTool input[type="number"]{
  width:76px;
  padding:8px 10px;
}
.waveCanvas{
  width:100%;
  height:128px;
  display:block;
  background:#0d1730;
  border-radius:10px;
  border:1px solid #2a3b58;
  touch-action:none;
  user-select:none;
}
.legend{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:8px;
}
.legendItem{
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--muted);
  font-size:.9rem;
}
.swatch{
  width:12px;
  height:12px;
  border-radius:999px;
}

.quickChordGrid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
.quickChordBtn{
  padding:14px 10px;
  font-weight:700;
  background:#1a2b48;
}
.quickChordBtn.empty{
  opacity:.45;
}
.rootPadGrid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}
.rootPadBtn{
  padding:16px 10px;
  font-weight:700;
  background:#182949;
}
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#1a2b48;
  color:var(--muted);
  font-size:.82rem;
  margin-left:8px;
}
@media (max-width:640px){
  .grid2,.grid3,.grid4{ grid-template-columns:1fr; }
  .quickChordGrid,.rootPadGrid{ grid-template-columns:repeat(3,minmax(0,1fr)); }
  .waveHeader{
    flex-direction:column;
    align-items:stretch;
  }
}
</style>
</head>
<body>
<div class="app">
  <h1>HookPad v7.5</h1>
  <p>現状版 + 小節番号表示 + オーディオ塊ドラッグ。</p>

  <div class="panel">
    <h2 style="margin:0 0 12px;">フック録音</h2>

    <div class="row">
      <button id="warmupBtn" type="button">ウォームアップ</button>
      <button id="metroBtn" type="button">メトロノーム開始</button>
      <button id="startRecBtn" type="button">録音開始</button>
      <button id="stopRecBtn" type="button">録音停止</button>
      <button id="downloadRecBtn" type="button">録音を保存</button>
      <button id="detectHeadBtn" type="button" class="warn">頭出し候補を反映</button>
    </div>

    <div class="grid2" style="margin-top:12px;">
      <div>
        <label>曲名 / メモ名</label>
        <input id="projectName" placeholder="例：新曲サビ候補A" />
      </div>
      <div>
        <label>BPM</label>
        <input id="bpm" type="number" value="120" min="40" max="240" />
      </div>
    </div>

    <div class="grid4" style="margin-top:12px;">
      <div>
        <label>自動トリム（秒）</label>
        <input id="autoTrim" type="number" value="2.40" step="0.01" />
      </div>
      <div>
        <label>録音再生オフセット（秒）</label>
        <input id="audioOffset" type="number" value="0.00" step="0.01" />
      </div>
      <div>
        <label>コード再生オフセット（秒）</label>
        <input id="chordOffset" type="number" value="0.00" step="0.01" />
      </div>
      <div>
        <label>キー</label>
        <select id="keySelect"></select>
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <label>
        <input id="clickToggle" type="checkbox" checked style="width:auto;margin-right:8px;" />
        クリック音を鳴らす
      </label>
      <span class="badge" id="headDetectLabel">頭出し: 未解析</span>
    </div>

    <div class="beatBox">
      <div class="beat" data-beat="0">1</div>
      <div class="beat" data-beat="1">2</div>
      <div class="beat" data-beat="2">3</div>
      <div class="beat" data-beat="3">4</div>
    </div>

    <div class="status" id="recordStatus">ウォームアップ → 録音 → 頭を合わせる → ループでコード探し。</div>
    <audio id="audioPlayer" controls></audio>
    <div class="small" style="margin-top:8px;">
      黄色 = ソース内の頭出し / 緑の塊 = 実際のリージョン
    </div>

    <div class="waveWrap">
      <div class="waveHeader">
        <div class="waveHeaderLeft">
          <strong>録音波形</strong>
          <span class="small" id="waveInfo">録音後に表示</span>
        </div>

        <div class="waveTools">
          <label class="waveTool">
            <input id="snapToggle" type="checkbox" checked />
            <span>Snap</span>
          </label>

          <label class="waveTool">
            <span>単位</span>
            <select id="snapDivision">
              <option value="off">OFF</option>
              <option value="1/4" selected>1/4</option>
              <option value="1/8">1/8</option>
              <option value="1/16">1/16</option>
              <option value="1/32">1/32</option>
            </select>
          </label>

          <label class="waveTool">
            <span>強度(px)</span>
            <input id="snapStrength" type="number" value="12" min="4" max="40" step="1" />
          </label>
        </div>
      </div>

      <canvas id="waveCanvas" class="waveCanvas" width="900" height="128"></canvas>

      <div class="legend">
        <div class="legendItem"><span class="swatch" style="background:#3bb7ff;"></span>波形 / ライブ波形</div>
        <div class="legendItem"><span class="swatch" style="background:#ffc857;"></span>頭出し位置</div>
        <div class="legendItem"><span class="swatch" style="background:#38d39f;"></span>リージョン塊</div>
      </div>

      <div class="small" style="margin-top:8px;">
        黄色線ドラッグ = 頭出し変更 / 緑の塊ドラッグ = リージョン移動
      </div>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード進行</h2>

    <div class="grid4" style="margin-bottom:12px;">
      <div>
        <label>ループ開始小節</label>
        <input id="loopStartBar" type="number" min="1" value="1" />
      </div>
      <div>
        <label>ループ終了小節</label>
        <input id="loopEndBar" type="number" min="1" value="4" />
      </div>
      <div style="display:flex;align-items:end;">
        <button id="setLoopToSelectionBtn" type="button" style="width:100%;">現在選択を開始に</button>
      </div>
      <div style="display:flex;align-items:end;">
        <button id="setLoopEndToSelectionBtn" type="button" style="width:100%;">現在選択を終了に</button>
      </div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="row">
      <button id="leftBtn" type="button">◀</button>
      <button id="rightBtn" type="button">▶</button>
      <button id="deleteBtn" type="button">⌫</button>
      <button id="addBarsBtn" type="button">+4</button>
      <button id="loopBtn" type="button">LOOP</button>
    </div>

    <div class="status" id="loopStatus">録音とコードを同時ループして、ルートから探す。</div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">作曲モード</h2>

    <div class="small" style="margin-bottom:8px;">ルートパッド</div>
    <div class="rootPadGrid" id="rootPadGrid"></div>

    <div class="small" style="margin:12px 0 8px;">ダイアトニック</div>
    <div class="quickChordGrid" id="diatonicGrid"></div>

    <div class="small" style="margin:12px 0 8px;">最近使ったコード</div>
    <div class="quickChordGrid" id="recentChordGrid"></div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード入力</h2>

    <div class="grid3">
      <select id="root"></select>
      <select id="type"></select>
      <select id="slash"></select>
    </div>

    <div class="row" style="margin-top:12px;">
      <button id="addChordBtn" type="button">追加</button>
      <button id="previewBtn" type="button">試聴</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">歌詞メモ</h2>
    <textarea id="lyrics" placeholder="仮歌詞 / フレーズ / 連想ワード"></textarea>
  </div>
</div>

<script>
const roots = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
const types = ["","m","7","maj7","m7","sus2","sus4","9","11","add9","aug","dim","m7b5","mM7"];

const DIATONIC_MAJOR = [
  {degree:0, type:"", label:"I"},
  {degree:2, type:"m", label:"ii"},
  {degree:4, type:"m", label:"iii"},
  {degree:5, type:"", label:"IV"},
  {degree:7, type:"", label:"V"},
  {degree:9, type:"m", label:"vi"},
  {degree:11, type:"dim", label:"vii°"}
];

const rootSel = document.getElementById("root");
const typeSel = document.getElementById("type");
const slashSel = document.getElementById("slash");
const timelineEl = document.getElementById("timeline");
const bpmEl = document.getElementById("bpm");
const audioPlayer = document.getElementById("audioPlayer");
const recordStatus = document.getElementById("recordStatus");
const loopStatus = document.getElementById("loopStatus");
const clickToggle = document.getElementById("clickToggle");
const snapToggle = document.getElementById("snapToggle");
const snapDivisionEl = document.getElementById("snapDivision");
const snapStrengthEl = document.getElementById("snapStrength");
const warmupBtn = document.getElementById("warmupBtn");
const metroBtn = document.getElementById("metroBtn");
const startRecBtn = document.getElementById("startRecBtn");
const stopRecBtn = document.getElementById("stopRecBtn");
const downloadRecBtn = document.getElementById("downloadRecBtn");
const detectHeadBtn = document.getElementById("detectHeadBtn");
const autoTrimEl = document.getElementById("autoTrim");
const audioOffsetEl = document.getElementById("audioOffset");
const chordOffsetEl = document.getElementById("chordOffset");
const loopBtn = document.getElementById("loopBtn");
const beatEls = [...document.querySelectorAll(".beat")];
const waveCanvas = document.getElementById("waveCanvas");
const waveInfo = document.getElementById("waveInfo");
const loopStartBarEl = document.getElementById("loopStartBar");
const loopEndBarEl = document.getElementById("loopEndBar");
const keySelect = document.getElementById("keySelect");
const headDetectLabel = document.getElementById("headDetectLabel");
const lyricsEl = document.getElementById("lyrics");
const projectNameEl = document.getElementById("projectName");

const state = {
  slots: ["-","-","-","-"],
  cursor: 0,

  audioCtx: null,
  mediaRecorder: null,
  mediaStream: null,
  recordedChunks: [],
  recordedBlob: null,

  warmedUp: false,
  mode: "idle",

  metroTimerId: null,
  metroLookahead: 25.0,
  metroScheduleAheadTime: 0.12,
  metroNextNoteTime: 0.0,
  metroBeatNumber: 0,
  metronomeOn: false,

  pendingChordTimeouts: [],
  pendingAudioTimeouts: [],
  loopRafId: null,
  loopStartTime: 0,

  currentBeatVisual: -1,
  playingBarIndex: -1,

  waveformData: null,
  waveformDuration: 0,
  audioBufferMono: null,
  detectedHeadSec: null,

  recentChords: [],

  dragMode: null,

  analyser: null,
  liveDataArray: null,
  liveRAF: null
};

function saveState(){
  const data = {
    bpm: bpmEl.value,
    autoTrim: autoTrimEl.value,
    audioOffset: audioOffsetEl.value,
    chordOffset: chordOffsetEl.value,
    click: clickToggle.checked,
    snap: snapToggle.checked,
    snapDivision: snapDivisionEl.value,
    snapStrength: snapStrengthEl.value,
    loopStartBar: loopStartBarEl.value,
    loopEndBar: loopEndBarEl.value,
    recentChords: state.recentChords,
    slots: state.slots,
    lyrics: lyricsEl.value,
    projectName: projectNameEl.value,
    key: keySelect.value
  };
  localStorage.setItem("hookpad_current_state", JSON.stringify(data));
}

function loadState(){
  const raw = localStorage.getItem("hookpad_current_state");
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    if(data.bpm !== undefined) bpmEl.value = data.bpm;
    if(data.autoTrim !== undefined) autoTrimEl.value = data.autoTrim;
    if(data.audioOffset !== undefined) audioOffsetEl.value = data.audioOffset;
    if(data.chordOffset !== undefined) chordOffsetEl.value = data.chordOffset;
    if(typeof data.click === "boolean") clickToggle.checked = data.click;
    if(typeof data.snap === "boolean") snapToggle.checked = data.snap;
    if(data.snapDivision !== undefined) snapDivisionEl.value = data.snapDivision;
    if(data.snapStrength !== undefined) snapStrengthEl.value = data.snapStrength;
    if(data.loopStartBar !== undefined) loopStartBarEl.value = data.loopStartBar;
    if(data.loopEndBar !== undefined) loopEndBarEl.value = data.loopEndBar;
    if(Array.isArray(data.recentChords)) state.recentChords = data.recentChords.slice(0, 6);
    if(Array.isArray(data.slots)) state.slots = data.slots;
    if(typeof data.lyrics === "string") lyricsEl.value = data.lyrics;
    if(typeof data.projectName === "string") projectNameEl.value = data.projectName;
    if(typeof data.key === "string") keySelect.value = data.key;
  }catch(e){}
}

function buildSelects(){
  roots.forEach(r=>{
    const o = document.createElement("option");
    o.value = r;
    o.textContent = r;
    rootSel.appendChild(o);

    const s = document.createElement("option");
    s.value = r;
    s.textContent = r;
    slashSel.appendChild(s);

    const k = document.createElement("option");
    k.value = r;
    k.textContent = r + " major";
    keySelect.appendChild(k);
  });

  const none = document.createElement("option");
  none.value = "";
  none.textContent = "none";
  slashSel.prepend(none);
  slashSel.value = "";

  types.forEach(t=>{
    const o = document.createElement("option");
    o.value = t;
    o.textContent = t || "major";
    typeSel.appendChild(o);
  });
}

function normalizedLoopRange(){
  const total = state.slots.length;
  let start = parseInt(loopStartBarEl.value || "1", 10);
  let end = parseInt(loopEndBarEl.value || String(total), 10);

  if(Number.isNaN(start)) start = 1;
  if(Number.isNaN(end)) end = total;

  start = Math.max(1, Math.min(start, total));
  end = Math.max(1, Math.min(end, total));

  if(start > end){
    const tmp = start;
    start = end;
    end = tmp;
  }

  return { start, end };
}

function renderTimeline(){
  const range = normalizedLoopRange();
  timelineEl.innerHTML = "";
  state.slots.forEach((chord, i)=>{
    const barNo = i + 1;
    const div = document.createElement("button");
    div.type = "button";
    div.className = "slot";
    if(i === state.cursor) div.classList.add("active");
    if(i === state.playingBarIndex) div.classList.add("playing");
    if(barNo >= range.start && barNo <= range.end) div.classList.add("loopRange");
    div.textContent = chord + " / " + barNo + "小節目";
    div.onclick = ()=>{
      state.cursor = i;
      renderTimeline();
    };
    timelineEl.appendChild(div);
  });
}

function setBeatVisual(beatInBar){
  state.currentBeatVisual = beatInBar;
  beatEls.forEach((el, i)=>{
    el.classList.remove("on","down");
    if(i === beatInBar){
      el.classList.add("on");
      if(i === 0) el.classList.add("down");
    }
  });
}

function clearBeatVisual(){
  state.currentBeatVisual = -1;
  beatEls.forEach(el=>el.classList.remove("on","down"));
}

function currentChordName(){
  const root = rootSel.value;
  const type = typeSel.value;
  const slash = slashSel.value;
  return root + type + (slash ? "/" + slash : "");
}

function parseChordName(chord){
  const m = chord.match(/^([A-G][b#]?)(.*?)(?:\/([A-G][b#]?))?$/);
  if(!m) return { root:"C", type:"", slash:"" };
  return {
    root: m[1] || "C",
    type: m[2] || "",
    slash: m[3] || ""
  };
}

function rememberChord(chord){
  state.recentChords = state.recentChords.filter(c => c !== chord);
  state.recentChords.unshift(chord);
  state.recentChords = state.recentChords.slice(0, 6);
  renderRecentChords();
  saveState();
}

function renderRecentChords(){
  const grid = document.getElementById("recentChordGrid");
  grid.innerHTML = "";

  for(let i = 0; i < 6; i++){
    const chord = state.recentChords[i];
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "quickChordBtn" + (chord ? "" : " empty");
    btn.textContent = chord || "-";
    btn.disabled = !chord;
    if(chord){
      btn.onclick = ()=>applyQuickChord(chord);
    }
    grid.appendChild(btn);
  }
}

function renderRootPad(){
  const grid = document.getElementById("rootPadGrid");
  grid.innerHTML = "";
  roots.forEach(r=>{
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "rootPadBtn";
    btn.textContent = r;
    btn.onclick = ()=>applyQuickChord(r);
    grid.appendChild(btn);
  });
}

function chordDisplayName(rootIndex, type){
  return roots[rootIndex % 12] + type;
}

function renderDiatonicChords(){
  const grid = document.getElementById("diatonicGrid");
  grid.innerHTML = "";

  const keyRoot = roots.indexOf(keySelect.value || "C");
  DIATONIC_MAJOR.forEach(item=>{
    const chord = chordDisplayName(keyRoot + item.degree, item.type);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "quickChordBtn";
    btn.textContent = chord;
    btn.title = item.label;
    btn.onclick = ()=>applyQuickChord(chord);
    grid.appendChild(btn);
  });
}

async function ensureAudio(){
  if(!state.audioCtx){
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(state.audioCtx.state === "suspended"){
    await state.audioCtx.resume();
  }
}

function noteFreq(note){
  const map = {
    C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,
    G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11
  };
  const midi = 60 + map[note];
  return 440 * Math.pow(2, (midi - 69) / 12);
}

async function playChord(root, type){
  await ensureAudio();

  let intervals = [0,4,7];
  if(type === "m") intervals = [0,3,7];
  if(type === "7") intervals = [0,4,7,10];
  if(type === "maj7") intervals = [0,4,7,11];
  if(type === "m7") intervals = [0,3,7,10];
  if(type === "sus2") intervals = [0,2,7];
  if(type === "sus4") intervals = [0,5,7];
  if(type === "dim") intervals = [0,3,6];
  if(type === "aug") intervals = [0,4,8];
  if(type === "m7b5") intervals = [0,3,6,10];
  if(type === "9") intervals = [0,4,7,10,14];
  if(type === "11") intervals = [0,4,7,10,14,17];
  if(type === "add9") intervals = [0,4,7,14];
  if(type === "mM7") intervals = [0,3,7,11];

  const rootIndex = roots.indexOf(root);
  intervals.forEach(i=>{
    const note = roots[(rootIndex + (i % 12)) % 12];
    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = noteFreq(note);

    osc.connect(gain);
    gain.connect(state.audioCtx.destination);

    gain.gain.setValueAtTime(0.13, state.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 1.0);

    osc.start();
    osc.stop(state.audioCtx.currentTime + 1.0);
  });
}

async function playBass(root){
  await ensureAudio();

  const map = {
    C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,
    G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11
  };
  const midi = 36 + map[root];
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(state.audioCtx.destination);

  gain.gain.setValueAtTime(0.2, state.audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 1.1);

  osc.start();
  osc.stop(state.audioCtx.currentTime + 1.1);
}

function metroSecondsPerBeat(){
  return 60.0 / (Number(bpmEl.value) || 120);
}

function scheduleClick(time, isDownbeat){
  if(!clickToggle.checked || !state.audioCtx) return;

  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();
  osc.type = "square";
  osc.frequency.value = isDownbeat ? 1400 : 1000;
  osc.connect(gain);
  gain.connect(state.audioCtx.destination);

  gain.gain.setValueAtTime(isDownbeat ? 0.35 : 0.22, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);

  osc.start(time);
  osc.stop(time + 0.04);
}

function metroScheduler(){
  while(state.metroNextNoteTime < state.audioCtx.currentTime + state.metroScheduleAheadTime){
    const beatNumber = state.metroBeatNumber;
    const beatInBar = beatNumber % 4;

    scheduleClick(state.metroNextNoteTime, beatInBar === 0);

    const visualDelay = Math.max(0, (state.metroNextNoteTime - state.audioCtx.currentTime) * 1000);
    const t = setTimeout(()=>{
      if(state.metronomeOn || state.mode === "loop"){
        setBeatVisual(beatInBar);
      }
    }, visualDelay);
    state.pendingAudioTimeouts.push(t);

    state.metroNextNoteTime += metroSecondsPerBeat();
    state.metroBeatNumber++;
  }
}

async function startMetronome(){
  await ensureAudio();
  stopMetronome();

  state.metroBeatNumber = 0;
  state.metroNextNoteTime = state.audioCtx.currentTime + 0.08;
  state.metroTimerId = setInterval(metroScheduler, state.metroLookahead);
  state.metronomeOn = true;
  metroBtn.textContent = "メトロノーム停止";
}

function stopMetronome(){
  if(state.metroTimerId){
    clearInterval(state.metroTimerId);
    state.metroTimerId = null;
  }
  state.metronomeOn = false;
  metroBtn.textContent = "メトロノーム開始";
  if(state.mode !== "loop") clearBeatVisual();
}

async function toggleMetronome(){
  if(state.metronomeOn) stopMetronome();
  else await startMetronome();
}

async function warmupAudioAndMic(){
  if(state.warmedUp){
    recordStatus.textContent = "ウォームアップ済み。";
    return;
  }

  try{
    recordStatus.textContent = "ウォームアップ中…";
    await ensureAudio();

    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();
    gain.gain.value = 0.00001;
    osc.connect(gain);
    gain.connect(state.audioCtx.destination);
    osc.start();
    osc.stop(state.audioCtx.currentTime + 0.02);

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t => t.stop());

    state.warmedUp = true;
    recordStatus.textContent = "ウォームアップ完了。";
  }catch(e){
    recordStatus.textContent = "ウォームアップ失敗。マイク許可を確認してみて。";
  }
}

async function addChordToTimeline(){
  const chord = currentChordName();
  state.slots[state.cursor] = chord;

  const root = chord.match(/^[A-G][b#]?/)[0];
  const type = chord.replace(root, "").split("/")[0];

  rememberChord(chord);

  await playChord(root, type);
  await playBass(root);

  if(state.cursor < state.slots.length - 1){
    state.cursor++;
  }
  renderTimeline();
  saveState();
}

async function applyQuickChord(chord){
  state.slots[state.cursor] = chord;

  const parts = parseChordName(chord);
  rootSel.value = parts.root;
  typeSel.value = parts.type || "";
  slashSel.value = parts.slash || "";

  rememberChord(chord);
  renderTimeline();

  await playChord(parts.root, parts.type || "");
  await playBass(parts.root);

  if(state.cursor < state.slots.length - 1){
    state.cursor++;
  }
  renderTimeline();
  saveState();
}

function deleteChord(){
  state.slots[state.cursor] = "-";
  renderTimeline();
  saveState();
}

function addBars(){
  state.slots.push("-","-","-","-");
  loopEndBarEl.value = state.slots.length;
  renderTimeline();
  saveState();
}

function moveLeft(){
  state.cursor = Math.max(0, state.cursor - 1);
  renderTimeline();
}

function moveRight(){
  state.cursor = Math.min(state.cursor + 1, state.slots.length - 1);
  renderTimeline();
}

async function playBarByIndex(barIndex){
  state.playingBarIndex = barIndex;
  renderTimeline();

  const chord = state.slots[barIndex];
  if(chord !== "-"){
    const root = chord.match(/^[A-G][b#]?/)[0];
    const type = chord.replace(root, "").split("/")[0];
    await playChord(root, type);
    await playBass(root);
  }
}

function clearPendingChordTimeouts(){
  if(state.pendingChordTimeouts.length){
    state.pendingChordTimeouts.forEach(id=>clearTimeout(id));
    state.pendingChordTimeouts = [];
  }
}

function clearPendingAudioTimeouts(){
  if(state.pendingAudioTimeouts.length){
    state.pendingAudioTimeouts.forEach(id=>clearTimeout(id));
    state.pendingAudioTimeouts = [];
  }
}

function clearLoopRaf(){
  if(state.loopRafId){
    cancelAnimationFrame(state.loopRafId);
    state.loopRafId = null;
  }
}

function stopLiveWave(){
  if(state.liveRAF){
    cancelAnimationFrame(state.liveRAF);
    state.liveRAF = null;
  }
  state.analyser = null;
  state.liveDataArray = null;
}

function effectiveAudioStart(){
  const autoTrim = Number(autoTrimEl.value) || 0;
  const audioOffset = Number(audioOffsetEl.value) || 0;
  return Math.max(0, autoTrim + audioOffset);
}

function getRegionLengthSec(){
  if(!state.waveformDuration) return 0;
  const effectiveSec = effectiveAudioStart();
  return Math.max(0.2, state.waveformDuration - effectiveSec);
}

function stopLoop(){
  clearPendingChordTimeouts();
  clearPendingAudioTimeouts();
  clearLoopRaf();

  state.mode = "idle";
  state.playingBarIndex = -1;
  state.loopStartTime = 0;
  loopBtn.textContent = "LOOP";
  loopStatus.textContent = "LOOP停止。";

  if(!audioPlayer.paused){
    audioPlayer.pause();
  }

  if(!state.metronomeOn) clearBeatVisual();
  renderTimeline();
}

function scheduleLoopVisualsAndChords(startTime, chordOffsetSec){
  const beatSec = metroSecondsPerBeat();
  const barSec = beatSec * 4;
  const range = normalizedLoopRange();
  const startIndex = range.start - 1;
  const loopBarCount = (range.end - range.start + 1);

  function tick(){
    if(state.mode !== "loop" || !state.audioCtx){
      clearLoopRaf();
      return;
    }

    const now = state.audioCtx.currentTime;
    const elapsed = now - startTime;

    if(elapsed >= 0){
      const beatInBar = Math.floor(elapsed / beatSec) % 4;
      setBeatVisual(beatInBar);

      const localBar = Math.floor(elapsed / barSec) % loopBarCount;
      const barIndex = startIndex + localBar;

      if(barIndex !== state.playingBarIndex){
        state.playingBarIndex = barIndex;
        state.cursor = barIndex;
        renderTimeline();

        const playAt = Math.max(0, chordOffsetSec * 1000);
        const t = setTimeout(()=>{
          if(state.mode !== "loop") return;
          playBarByIndex(barIndex);
        }, playAt);

        state.pendingChordTimeouts.push(t);
      }
    }

    state.loopRafId = requestAnimationFrame(tick);
  }

  tick();
}

async function startLoop(){
  stopLoop();
  state.mode = "loop";
  loopBtn.textContent = "STOP LOOP";

  await ensureAudio();

  const chordOffset = Number(chordOffsetEl.value) || 0;
  const audioStart = effectiveAudioStart();
  const range = normalizedLoopRange();
  const startIndex = range.start - 1;
  const loopBarCount = range.end - range.start + 1;

  const startTime = state.audioCtx.currentTime + 0.18;
  state.loopStartTime = startTime;

  if(clickToggle.checked){
    const beatSec = metroSecondsPerBeat();
    const totalBeats = Math.max(8, loopBarCount * 4);
    for(let i = 0; i < totalBeats; i++){
      const t = startTime + (i * beatSec);
      scheduleClick(t, i % 4 === 0);
    }
  }

  if(audioPlayer.src){
    const delayMs = Math.max(0, (startTime - state.audioCtx.currentTime) * 1000);
    const audioTimer = setTimeout(async ()=>{
      if(state.mode !== "loop") return;
      try{
        const startSec = audioStart + (startIndex * metroSecondsPerBeat() * 4);
        audioPlayer.pause();
        audioPlayer.currentTime = Math.min(startSec, Math.max(0, audioPlayer.duration || startSec));
        await audioPlayer.play();
        loopStatus.textContent = `${range.start}〜${range.end}小節目をループ中。`;
      }catch(e){
        loopStatus.textContent = "コード再生中。録音は手動再生が必要かも。";
      }
    }, delayMs);
    state.pendingAudioTimeouts.push(audioTimer);
  }else{
    loopStatus.textContent = `${range.start}〜${range.end}小節目をループ中。録音はまだ無し。`;
  }

  scheduleLoopVisualsAndChords(startTime, chordOffset);
}

function toggleLoop(){
  if(state.mode === "loop") stopLoop();
  else startLoop();
}

async function decodeBlobAndWaveform(blob){
  const arrayBuffer = await blob.arrayBuffer();
  const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
  const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer.slice(0));

  const ch = audioBuffer.getChannelData(0);
  state.audioBufferMono = ch.slice(0);
  state.waveformDuration = audioBuffer.duration;

  const samples = 900;
  const blockSize = Math.floor(ch.length / samples) || 1;
  const data = [];

  for(let i = 0; i < samples; i++){
    let sum = 0;
    const start = i * blockSize;
    const end = Math.min(start + blockSize, ch.length);
    for(let j = start; j < end; j++){
      sum += Math.abs(ch[j]);
    }
    data.push(sum / Math.max(1, end - start));
  }

  state.waveformData = data;

  await tempCtx.close();
  detectAudioHead();
  drawWaveform();
}

function detectAudioHead(){
  if(!state.audioBufferMono || !state.audioBufferMono.length || !state.waveformDuration){
    state.detectedHeadSec = null;
    headDetectLabel.textContent = "頭出し: 未解析";
    return;
  }

  const ch = state.audioBufferMono;
  const sampleRate = Math.floor(ch.length / state.waveformDuration);
  let max = 0;

  for(let i = 0; i < ch.length; i++){
    const v = Math.abs(ch[i]);
    if(v > max) max = v;
  }

  const threshold = Math.max(0.015, max * 0.18);

  let hit = -1;
  for(let i = 0; i < ch.length; i++){
    if(Math.abs(ch[i]) >= threshold){
      hit = i;
      break;
    }
  }

  if(hit < 0){
    state.detectedHeadSec = null;
    headDetectLabel.textContent = "頭出し: 検出失敗";
    return;
  }

  const sec = hit / sampleRate;
  const rounded = Math.round(sec * 100) / 100;
  state.detectedHeadSec = rounded;
  headDetectLabel.textContent = "頭出し候補: " + rounded.toFixed(2) + "秒";
}

function applyDetectedHead(){
  if(state.detectedHeadSec == null) return;
  autoTrimEl.value = state.detectedHeadSec.toFixed(2);
  drawWaveform();
  saveState();
  recordStatus.textContent = `頭出し候補 ${state.detectedHeadSec.toFixed(2)} 秒を反映。`;
}

function trimFromCanvasX(clientX){
  const rect = waveCanvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
  const ratio = rect.width > 0 ? x / rect.width : 0;
  const sec = ratio * state.waveformDuration;
  return Math.max(0, Math.min(sec, state.waveformDuration || 0));
}

function getSnapStepSec(){
  const bpm = Number(bpmEl.value) || 120;
  const beatSec = 60 / bpm;
  const div = snapDivisionEl.value;

  if(div === "off") return null;
  if(div === "1/4") return beatSec;
  if(div === "1/8") return beatSec / 2;
  if(div === "1/16") return beatSec / 4;
  if(div === "1/32") return beatSec / 8;

  return beatSec;
}

function snapTimeToGrid(sec){
  if(!snapToggle.checked) return sec;

  const duration = state.waveformDuration;
  if(!duration) return sec;

  const stepSec = getSnapStepSec();
  if(!stepSec) return sec;

  const strength = Number(snapStrengthEl.value) || 12;
  const canvasWidth = waveCanvas.getBoundingClientRect().width;
  const pxPerSec = canvasWidth / duration;

  let closest = sec;
  let minDist = Infinity;

  for(let t = 0; t < duration + stepSec; t += stepSec){
    const dist = Math.abs((t - sec) * pxPerSec);
    if(dist < minDist){
      minDist = dist;
      closest = t;
    }
  }

  if(minDist <= strength){
    return Math.max(0, Math.min(closest, duration));
  }

  return sec;
}

function setTrimFromPointer(clientX){
  if(!state.waveformDuration) return;
  let sec = trimFromCanvasX(clientX);
  sec = snapTimeToGrid(sec);
  autoTrimEl.value = sec.toFixed(2);
  drawWaveform();
}

function setRegionFromPointer(clientX){
  if(!state.waveformDuration) return;

  let sec = trimFromCanvasX(clientX);
  sec = snapTimeToGrid(sec);

  const trimSec = Math.max(0, Number(autoTrimEl.value) || 0);
  const regionLen = getRegionLengthSec();
  const maxStart = Math.max(0, state.waveformDuration - regionLen);
  const clampedSec = Math.max(0, Math.min(sec, maxStart));

  const newOffset = clampedSec - trimSec;
  audioOffsetEl.value = newOffset.toFixed(2);
  drawWaveform();
}

function getRegionBoundsPx(){
  const rect = waveCanvas.getBoundingClientRect();
  const w = rect.width;
  const duration = state.waveformDuration || 0;
  const regionStartSec = effectiveAudioStart();
  const regionLenSec = getRegionLengthSec();
  const startX = (regionStartSec / Math.max(duration, 0.0001)) * w;
  const endX = ((regionStartSec + regionLenSec) / Math.max(duration, 0.0001)) * w;
  return { startX, endX, width: w };
}

function hitTestDragMode(clientX){
  if(!state.waveformDuration) return "trim";

  const rect = waveCanvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const trimSec = Math.max(0, Number(autoTrimEl.value) || 0);
  const trimX = (trimSec / state.waveformDuration) * rect.width;
  const region = getRegionBoundsPx();

  if(Math.abs(x - trimX) <= 14) return "trim";
  if(x >= region.startX && x <= region.endX) return "region";
  return "trim";
}

function attachWavePointer(){
  waveCanvas.addEventListener("mousedown", (e)=>{
    state.dragMode = hitTestDragMode(e.clientX);
    if(state.dragMode === "region") setRegionFromPointer(e.clientX);
    else setTrimFromPointer(e.clientX);
  });

  window.addEventListener("mousemove", (e)=>{
    if(!state.dragMode) return;
    if(state.dragMode === "region") setRegionFromPointer(e.clientX);
    else setTrimFromPointer(e.clientX);
  });

  window.addEventListener("mouseup", ()=>{
    if(!state.dragMode) return;
    state.dragMode = null;
    saveState();
  });

  waveCanvas.addEventListener("touchstart", (e)=>{
    if(!e.touches.length) return;
    state.dragMode = hitTestDragMode(e.touches[0].clientX);
    if(state.dragMode === "region") setRegionFromPointer(e.touches[0].clientX);
    else setTrimFromPointer(e.touches[0].clientX);
  }, {passive:true});

  window.addEventListener("touchmove", (e)=>{
    if(!state.dragMode || !e.touches.length) return;
    if(state.dragMode === "region") setRegionFromPointer(e.touches[0].clientX);
    else setTrimFromPointer(e.touches[0].clientX);
  }, {passive:true});

  window.addEventListener("touchend", ()=>{
    if(!state.dragMode) return;
    state.dragMode = null;
    saveState();
  });
}

function drawGrid(ctx, w, h, durationSec){
  if(!durationSec) return;

  const bpm = Number(bpmEl.value) || 120;
  const beatSec = 60 / bpm;
  const barSec = beatSec * 4;

  let subStepSec = getSnapStepSec();
  if(!subStepSec) subStepSec = beatSec;

  ctx.strokeStyle = "rgba(255,255,255,0.06)";
  ctx.lineWidth = 1;
  for(let t = 0; t < durationSec; t += subStepSec){
    const x = (t / durationSec) * w;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }

  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1;
  for(let t = 0; t < durationSec; t += beatSec){
    const x = (t / durationSec) * w;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }

  ctx.strokeStyle = "rgba(255,255,255,0.22)";
  ctx.lineWidth = 2;
  for(let t = 0; t < durationSec; t += barSec){
    const x = (t / durationSec) * w;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
}

function drawBarNumbers(ctx, w, h, durationSec){
  if(!durationSec) return;

  const bpm = Number(bpmEl.value) || 120;
  const barSec = (60 / bpm) * 4;

  ctx.fillStyle = "#8fa1c5";
  ctx.font = "11px system-ui";

  let bar = 1;
  for(let t = 0; t < durationSec; t += barSec){
    const x = (t / durationSec) * w;
    ctx.fillText(String(bar), x + 4, 12);
    bar++;
  }
}

function drawLiveWaveform(){
  if(!state.analyser || !state.liveDataArray) return;

  const ctx = waveCanvas.getContext("2d");
  const w = waveCanvas.width;
  const h = waveCanvas.height;

  state.analyser.getByteTimeDomainData(state.liveDataArray);

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0d1730";
  ctx.fillRect(0,0,w,h);

  drawGrid(ctx, w, h, 4.0);
  drawBarNumbers(ctx, w, h, 4.0);

  ctx.strokeStyle = "#243656";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();

  ctx.lineWidth = 2;
  ctx.strokeStyle = "#3bb7ff";
  ctx.beginPath();

  const slice = w / state.liveDataArray.length;
  let x = 0;

  for(let i = 0; i < state.liveDataArray.length; i++){
    const v = state.liveDataArray[i] / 128.0;
    const y = v * h / 2;
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += slice;
  }
  ctx.stroke();

  waveInfo.textContent = "録音中ライブ波形";
  if(state.mode === "recording"){
    state.liveRAF = requestAnimationFrame(drawLiveWaveform);
  }
}

function drawWaveform(){
  const ctx = waveCanvas.getContext("2d");
  const w = waveCanvas.width;
  const h = waveCanvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#0d1730";
  ctx.fillRect(0,0,w,h);

  if(!state.waveformData || !state.waveformData.length || !state.waveformDuration){
    ctx.strokeStyle = "#243656";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    ctx.fillStyle = "#8fa1c5";
    ctx.font = "14px system-ui";
    ctx.fillText("録音後に波形が表示されます", 20, 30);
    return;
  }

  drawGrid(ctx, w, h, state.waveformDuration);
  drawBarNumbers(ctx, w, h, state.waveformDuration);

  ctx.strokeStyle = "#243656";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();

  const max = Math.max(...state.waveformData, 0.001);
  const step = w / state.waveformData.length;

  ctx.strokeStyle = "#3bb7ff";
  ctx.lineWidth = 1.2;
  ctx.beginPath();

  for(let i = 0; i < state.waveformData.length; i++){
    const v = state.waveformData[i] / max;
    const barH = v * (h * 0.42);
    const x = i * step;
    ctx.moveTo(x, h / 2 - barH);
    ctx.lineTo(x, h / 2 + barH);
  }
  ctx.stroke();

  const trimSec = Math.max(0, Number(autoTrimEl.value) || 0);
  const regionStartSec = effectiveAudioStart();
  const regionLenSec = getRegionLengthSec();

  const trimX = Math.min(w, (trimSec / state.waveformDuration) * w);
  const regionX = Math.min(w, (regionStartSec / state.waveformDuration) * w);
  const regionW = Math.max(6, Math.min(w - regionX, (regionLenSec / state.waveformDuration) * w));

  ctx.fillStyle = "rgba(56,211,159,0.18)";
  ctx.fillRect(regionX, 0, regionW, h);

  ctx.strokeStyle = "#38d39f";
  ctx.lineWidth = 2;
  ctx.strokeRect(regionX, 0, regionW, h);

  ctx.strokeStyle = "#ffc857";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(trimX, 0);
  ctx.lineTo(trimX, h);
  ctx.stroke();

  ctx.fillStyle = "#8fa1c5";
  ctx.font = "12px system-ui";
  ctx.fillText(`長さ: ${state.waveformDuration.toFixed(2)} 秒`, 12, h - 10);
  waveInfo.textContent = `長さ ${state.waveformDuration.toFixed(2)} 秒 / 頭出し ${trimSec.toFixed(2)} 秒 / リージョン ${regionStartSec.toFixed(2)} 秒`;
}

async function startRecording(){
  if(state.mode === "recording") return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    recordStatus.textContent = "このブラウザでは録音APIが使えないみたい。";
    return;
  }

  try{
    await ensureAudio();
    recordStatus.textContent = "録音開始中…";

    state.mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
    state.recordedChunks = [];

    const source = state.audioCtx.createMediaStreamSource(state.mediaStream);
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 1024;
    state.liveDataArray = new Uint8Array(state.analyser.fftSize);
    source.connect(state.analyser);

    state.mediaRecorder = new MediaRecorder(state.mediaStream);

    state.mediaRecorder.ondataavailable = (e)=>{
      if(e.data && e.data.size > 0) state.recordedChunks.push(e.data);
    };

    state.mediaRecorder.onstop = async ()=>{
      stopLiveWave();

      state.recordedBlob = new Blob(
        state.recordedChunks,
        { type: state.mediaRecorder.mimeType || "audio/webm" }
      );

      audioPlayer.src = URL.createObjectURL(state.recordedBlob);

      if(state.mediaStream){
        state.mediaStream.getTracks().forEach(t => t.stop());
      }

      state.mediaStream = null;
      state.mediaRecorder = null;
      state.mode = "idle";
      recordStatus.textContent = "録音できた。必要なら『録音を保存』でダウンロード。";

      try{
        await decodeBlobAndWaveform(state.recordedBlob);
      }catch(e){
        waveInfo.textContent = "波形解析失敗";
        headDetectLabel.textContent = "頭出し: 失敗";
      }
    };

    state.mediaRecorder.start();
    state.mode = "recording";
    recordStatus.textContent = "録音中…『録音停止』で止める。";

    drawLiveWaveform();
  }catch(err){
    stopLiveWave();
    state.mode = "idle";
    if(state.mediaStream){
      state.mediaStream.getTracks().forEach(t => t.stop());
      state.mediaStream = null;
    }
    state.mediaRecorder = null;
    recordStatus.textContent = "録音開始に失敗。マイク許可を確認してみて。";
  }
}

function stopRecording(){
  if(state.mode !== "recording" || !state.mediaRecorder) return;
  recordStatus.textContent = "停止中…";
  state.mediaRecorder.stop();
}

function downloadRecording(){
  if(!state.recordedBlob) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(state.recordedBlob);
  a.download = "hook-recording.webm";
  a.click();
}
