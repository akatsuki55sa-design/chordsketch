<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSketch v2</title>
<style>
:root{
  --bg:#081226;
  --panel:#0f1b33;
  --panel2:#182640;
  --line:#31435f;
  --text:#e8eefc;
  --muted:#9fb0d1;
  --accent:#3bb7ff;
  --accent2:#0c8fe0;
  --danger1:#ff4d57;
  --danger2:#b11f2b;
  --ok:#18b570;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  padding:0;
  background:linear-gradient(180deg,#071020,#0a1630 35%,#081226);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
body{min-height:100vh}
.app{
  max-width:860px;
  margin:0 auto;
  padding:16px;
}
.header{
  margin-bottom:12px;
}
.header h1{
  margin:0 0 4px;
  font-size:1.9rem;
}
.header p{
  margin:0;
  color:var(--muted);
}
.panel{
  background:rgba(15,27,51,.96);
  border:1px solid var(--line);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 14px 30px rgba(0,0,0,.28);
}
.titleRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}
.title{
  font-size:1.1rem;
  font-weight:700;
}
.small{
  font-size:.92rem;
  color:var(--muted);
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.grid3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.grid2{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
button,select,input,textarea{
  font:inherit;
  border:none;
  outline:none;
}
.btn{
  min-height:48px;
  padding:0 16px;
  border-radius:16px;
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  cursor:pointer;
  touch-action:manipulation;
}
.btn.primary{
  background:linear-gradient(180deg,var(--accent),var(--accent2));
  color:white;
}
.btn.ghost{
  background:rgba(24,38,64,.65);
}
.btn.ok{
  background:linear-gradient(180deg,#1fc47d,#0b8d58);
  color:white;
}
.btn.warn{
  background:linear-gradient(180deg,#ffb02e,#b86a00);
  color:white;
}
.recButtons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.bigBtn{
  min-height:110px;
  border-radius:28px;
  font-size:1.3rem;
  font-weight:700;
  letter-spacing:.02em;
  border:1px solid rgba(255,255,255,.16);
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
  touch-action:manipulation;
}
.startBtn{
  background:linear-gradient(180deg,var(--danger1),var(--danger2));
  color:white;
}
.stopBtn{
  background:linear-gradient(180deg,#ffb02e,#b86a00);
  color:white;
}
.timeline{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:2px;
}
.slot{
  min-width:116px;
  flex:0 0 auto;
  border-radius:18px;
  padding:14px 12px;
  text-align:center;
  background:var(--panel2);
  border:1px solid var(--line);
  cursor:pointer;
}
.slot.active{
  outline:2px solid var(--accent);
}
.slot .bar{
  font-size:.84rem;
  color:var(--muted);
  margin-top:6px;
}
.field label{
  display:block;
  font-size:.9rem;
  color:var(--muted);
  margin:0 0 6px;
}
input,select,textarea{
  width:100%;
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
textarea{
  min-height:96px;
  resize:vertical;
}
.status{
  margin-top:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(24,38,64,.6);
  border:1px solid var(--line);
  color:var(--muted);
}
.audioBox{
  display:none;
  margin-top:10px;
}
.audioBox.show{
  display:block;
}
audio{
  width:100%;
}
.chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:36px;
  padding:0 12px;
  border-radius:999px;
  background:rgba(24,38,64,.55);
  border:1px solid var(--line);
  color:var(--text);
}
.footerNote{
  font-size:.88rem;
  color:var(--muted);
  line-height:1.5;
}
@media (max-width:640px){
  .grid3,.grid2,.recButtons{
    grid-template-columns:1fr;
  }
  .header h1{
    font-size:1.65rem;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>ChordSketch v2</h1>
    <p>鼻歌・コード・歌詞を、スマホでひとまとめに残す。</p>
  </div>

  <div class="panel">
    <div class="titleRow">
      <div class="title">フック録音</div>
      <div class="small" id="recordStateText">録音待機中</div>
    </div>

    <div class="recButtons">
      <button class="bigBtn startBtn" id="startRecBtn" type="button">🎤 録音開始</button>
      <button class="bigBtn stopBtn" id="stopRecBtn" type="button">■ 録音停止</button>
    </div>

    <div class="grid2" style="margin-top:12px">
      <div class="field">
        <label for="projectName">曲名 / メモ名</label>
        <input id="projectName" placeholder="例：新曲サビ候補A">
      </div>
      <div class="field">
        <label for="bpm">BPM</label>
        <input id="bpm" type="number" value="110" min="40" max="240">
      </div>
    </div>

    <div class="audioBox" id="audioBox">
      <audio id="audioPlayer" controls></audio>
      <div class="row" style="margin-top:10px">
        <button class="btn ok" id="downloadRecBtn" type="button">録音を保存</button>
        <span class="chip" id="audioInfo">録音あり</span>
      </div>
    </div>

    <div class="status" id="recordStatus">「録音開始」で始めて、「録音停止」で止める。</div>
  </div>

  <div class="panel">
    <div class="titleRow">
      <div class="title">コード進行</div>
      <div class="small">タップで小節選択</div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="row" style="margin-top:12px">
      <button class="btn ghost" id="leftBtn" type="button">◀</button>
      <button class="btn ghost" id="rightBtn" type="button">▶</button>
      <button class="btn ghost" id="deleteBtn" type="button">⌫</button>
      <button class="btn ghost" id="addBarsBtn" type="button">+4</button>
      <button class="btn" id="loopBtn" type="button">▶ LOOP</button>
    </div>
  </div>

  <div class="panel">
    <div class="titleRow">
      <div class="title">コード入力</div>
      <div class="small">選んだ瞬間に鳴る</div>
    </div>

    <div class="grid3">
      <div class="field">
        <label for="root">Root</label>
        <select id="root"></select>
      </div>
      <div class="field">
        <label for="type">Type</label>
        <select id="type"></select>
      </div>
      <div class="field">
        <label for="slash">Slash</label>
        <select id="slash"></select>
      </div>
    </div>

    <div
