<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSketch v6.0</title>
<style>
:root{
  --bg:#081226;
  --panel:#0f1b33;
  --panel2:#182640;
  --line:#31435f;
  --text:#e8eefc;
  --muted:#9fb0d1;
  --accent:#3bb7ff;
  --accent2:#8dd7ff;
  --ok:#38d39f;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#081226;
  color:var(--text);
}
.app{
  max-width:860px;
  margin:0 auto;
  padding:16px;
}
.panel{
  background:rgba(15,27,51,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}
h1{
  margin:0 0 6px;
  font-size:1.8rem;
}
p{
  margin:0 0 12px;
  color:var(--muted);
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button,input,select,textarea{
  font:inherit;
}
button{
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#1b2b47;
  color:white;
}
button:active{
  transform:scale(.99);
}
button.ok{
  background:#194734;
  border-color:#2c9f73;
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  color:white;
}
textarea{
  min-height:90px;
}
.timeline{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}
.slot{
  min-width:110px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  text-align:center;
  transition:.12s ease;
}
.slot.active{
  outline:2px solid var(--accent);
  box-shadow:0 0 0 2px rgba(59,183,255,.15) inset;
}
.slot.playing{
  background:#213558;
  border-color:var(--accent);
  box-shadow:0 0 18px rgba(59,183,255,.22);
}
.status{
  margin-top:10px;
  padding:10px 12px;
  border-radius:12px;
  background:#182640;
  color:var(--muted);
}
audio{
  width:100%;
  margin-top:10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.grid2{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.grid3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.beatBox{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.beat{
  flex:1;
  text-align:center;
  padding:12px 0;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  color:var(--muted);
  font-weight:700;
  transition:.08s ease;
}
.beat.on{
  background:var(--accent);
  color:#081226;
  border-color:var(--accent2);
  box-shadow:0 0 18px rgba(59,183,255,.30);
}
.beat.down{
  background:#8dd7ff;
  color:#081226;
}
.small{
  font-size:.9rem;
  color:var(--muted);
}
.calBox{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#182640;
  border:1px solid var(--line);
}
.calValue{
  font-size:1.1rem;
  font-weight:700;
  color:var(--ok);
  margin-top:6px;
}
@media (max-width:640px){
  .grid,.grid2,.grid3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <h1>ChordSketch v6.0</h1>
  <p>端末レイテンシの半自動キャリブレーション付き版。</p>

  <div class="panel">
    <h2 style="margin:0 0 12px;">フック録音</h2>

    <div class="row">
      <button id="warmupBtn" type="button">ウォームアップ</button>
      <button id="metroBtn" type="button">メトロノーム開始</button>
      <button id="startRecBtn" type="button">録音開始</button>
      <button id="stopRecBtn" type="button">録音停止</button>
      <button id="downloadRecBtn" type="button">録音を保存</button>
    </div>

    <div class="grid2" style="margin-top:12px;">
      <div>
        <label>曲名 / メモ名</label>
        <input id="projectName" placeholder="例：新曲サビ候補A">
      </div>
      <div>
        <label>BPM</label>
        <input id="bpm" type="number" value="110" min="40" max="240">
      </div>
    </div>

    <div class="grid3" style="margin-top:12px;">
      <div>
        <label>自動トリム（秒）</label>
        <input id="autoTrim" type="number" value="0.90" step="0.01">
      </div>
      <div>
        <label>録音再生オフセット（秒）</label>
        <input id="audioOffset" type="number" value="0.00" step="0.01">
      </div>
      <div>
        <label>コード再生オフセット（秒）</label>
        <input id="chordOffset" type="number" value="0.00" step="0.01">
      </div>
    </div>

    <div style="margin-top:12px;">
      <label>
        <input id="clickToggle" type="checkbox" checked style="width:auto;margin-right:8px;">
        クリック音を鳴らす
      </label>
    </div>

    <div class="beatBox" id="beatBox">
      <div class="beat" data-beat="0">1</div>
      <div class="beat" data-beat="1">2</div>
      <div class="beat" data-beat="2">3</div>
      <div class="beat" data-beat="3">4</div>
    </div>

    <div class="status" id="recordStatus">ウォームアップ → メトロノーム開始 → 自分で数えて録音開始。</div>
    <audio id="audioPlayer" controls></audio>
    <div class="small" style="margin-top:8px;">
      LOOP時の録音再生位置 = 自動トリム + 録音再生オフセット
    </div>

    <div class="calBox">
      <div class="row">
        <button id="calibrateBtn" type="button">キャリブ開始</button>
        <button id="applyCalBtn" type="button" class="ok">推奨値を適用</button>
      </div>
      <div class="small" style="margin-top:8px;">
        4拍クリックを録音して、この端末の推奨トリム値を出す。
      </div>
      <div class="calValue" id="calResult">推奨トリム: 未計測</div>
      <audio id="calAudioPlayer" controls style="display:none;"></audio>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード進行</h2>
    <div class="timeline" id="timeline"></div>
    <div class="row">
      <button id="leftBtn" type="button">◀</button>
      <button id="rightBtn" type="button">▶</button>
      <button id="deleteBtn" type="button">⌫</button>
      <button id="addBarsBtn" type="button">+4</button>
      <button id="loopBtn" type="button">LOOP</button>
    </div>
    <div class="status" id="loopStatus">コードを基準に同期。ズレたら録音・コードのオフセットを少しずつ調整。</div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード入力</h2>
    <div class="grid">
      <select id="root"></select>
      <select id="type"></select>
      <select id="slash"></select>
    </div>
    <div class="row" style="margin-top:12px;">
      <button id="addChordBtn" type="button">追加</button>
      <button id="previewBtn" type="button">試聴</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">歌詞メモ</h2>
    <textarea id="lyrics" placeholder="仮歌詞 / フレーズ / 連想ワード"></textarea>
  </div>
</div>

<script>
const roots = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
const types = ["","m","7","maj7","m7","sus2","sus4","9","11","add9","aug","dim","m7b5","mM7"];

const rootSel = document.getElementById("root");
const typeSel = document.getElementById("type");
const slashSel = document.getElementById("slash");
const timelineEl = document.getElementById("timeline");
const bpmEl = document.getElementById("bpm");
const audioPlayer = document.getElementById("audioPlayer");
const calAudioPlayer = document.getElementById("calAudioPlayer");
const recordStatus = document.getElementById("recordStatus");
const loopStatus = document.getElementById("loopStatus");
const calResult = document.getElementById("calResult");
const startRecBtn = document.getElementById("startRecBtn");
const stopRecBtn = document.getElementById("stopRecBtn");
const downloadRecBtn = document.getElementById("downloadRecBtn");
const clickToggle = document.getElementById("clickToggle");
const warmupBtn = document.getElementById("warmupBtn");
const metroBtn = document.getElementById("metroBtn");
const audioOffsetEl = document.getElementById("audioOffset");
const chordOffsetEl = document.getElementById("chordOffset");
const autoTrimEl = document.getElementById("autoTrim");
const loopBtn = document.getElementById("loopBtn");
const calibrateBtn = document.getElementById("calibrateBtn");
const applyCalBtn = document.getElementById("applyCalBtn");
const beatEls = [...document.querySelectorAll(".beat")];

const state = {
  slots: ["-","-","-","-"],
  cursor: 0,

  audioCtx: null,
  mediaRecorder: null,
  mediaStream: null,
  recordedChunks: [],
  recordedBlob: null,

  warmedUp: false,
  mode: "idle", // idle, recording, loop, calibrating

  metroTimerId: null,
  metroLookahead: 25.0,
  metroScheduleAheadTime: 0.12,
  metroNextNoteTime: 0.0,
  metroBeatNumber: 0,
  metronomeOn: false,

  loopBarTimer: null,
  barIndex: 0,
  pendingChordTimeouts: [],
  pendingAudioTimeouts: [],

  currentBeatVisual: -1,
  playingBarIndex: -1,

  calibrationBlob: null,
  calibrationSuggestedTrim: null
};

function buildSelects(){
  roots.forEach(r=>{
    const o = document.createElement("option");
    o.value = r;
    o.textContent = r;
    rootSel.appendChild(o);

    const s = document.createElement("option");
    s.value = r;
    s.textContent = r;
    slashSel.appendChild(s);
  });

  const none = document.createElement("option");
  none.value = "";
  none.textContent = "none";
  slashSel.prepend(none);
  slashSel.value = "";

  types.forEach(t=>{
    const o = document.createElement("option");
    o.value = t;
    o.textContent = t || "major";
    typeSel.appendChild(o);
  });
}

function renderTimeline(){
  timelineEl.innerHTML = "";
  state.slots.forEach((chord, i)=>{
    const div = document.createElement("button");
    div.type = "button";
    div.className = "slot";
    if(i === state.cursor) div.classList.add("active");
    if(i === state.playingBarIndex) div.classList.add("playing");
    div.textContent = chord + " / " + (i + 1) + "小節目";
    div.onclick = ()=>{
      state.cursor = i;
      renderTimeline();
    };
    timelineEl.appendChild(div);
  });
}

function setBeatVisual(beatInBar){
  state.currentBeatVisual = beatInBar;
  beatEls.forEach((el, i)=>{
    el.classList.remove("on","down");
    if(i === beatInBar){
      el.classList.add("on");
      if(i === 0) el.classList.add("down");
    }
  });
}

function clearBeatVisual(){
  state.currentBeatVisual = -1;
  beatEls.forEach(el=>el.classList.remove("on","down"));
}

function currentChordName(){
  const root = rootSel.value;
  const type = typeSel.value;
  const slash = slashSel.value;
  return root + type + (slash ? "/" + slash : "");
}

async function ensureAudio(){
  if(!state.audioCtx){
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(state.audioCtx.state === "suspended"){
    await state.audioCtx.resume();
  }
}

function noteFreq(note){
  const map = {
    C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,
    G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11
  };
  const midi = 60 + map[note];
  return 440 * Math.pow(2, (midi - 69) / 12);
}

async function playChord(root, type){
  await ensureAudio();

  let intervals = [0,4,7];
  if(type === "m") intervals = [0,3,7];
  if(type === "7") intervals = [0,4,7,10];
  if(type === "maj7") intervals = [0,4,7,11];
  if(type === "m7") intervals = [0,3,7,10];
  if(type === "sus2") intervals = [0,2,7];
  if(type === "sus4") intervals = [0,5,7];
  if(type === "dim") intervals = [0,3,6];
  if(type === "aug") intervals = [0,4,8];

  const rootIndex = roots.indexOf(root);
  intervals.forEach(i=>{
    const note = roots[(rootIndex + i) % 12];
    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = noteFreq(note);

    osc.connect(gain);
    gain.connect(state.audioCtx.destination);

    gain.gain.setValueAtTime(0.15, state.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 1);

    osc.start();
    osc.stop(state.audioCtx.currentTime + 1);
  });
}

async function playBass(root){
  await ensureAudio();

  const map = {
    C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,
    G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11
  };
  const midi = 36 + map[root];
  const freq = 440 * Math.pow(2, (midi - 69) / 12);

  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(state.audioCtx.destination);

  gain.gain.setValueAtTime(0.22, state.audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 1.2);

  osc.start();
  osc.stop(state.audioCtx.currentTime + 1.2);
}

function metroSecondsPerBeat(){
  return 60.0 / (Number(bpmEl.value) || 110);
}

function scheduleClick(time, isDownbeat){
  if(!clickToggle.checked || !state.audioCtx) return;

  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = isDownbeat ? 1400 : 1000;

  osc.connect(gain);
  gain.connect(state.audioCtx.destination);

  gain.gain.setValueAtTime(isDownbeat ? 0.35 : 0.22, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);

  osc.start(time);
  osc.stop(time + 0.04);
}

function metroScheduler(){
  while(state.metroNextNoteTime < state.audioCtx.currentTime + state.metroScheduleAheadTime){
    const beatNumber = state.metroBeatNumber;
    const beatInBar = beatNumber % 4;

    scheduleClick(state.metroNextNoteTime, beatInBar === 0);

    const visualDelay = Math.max(0, (state.metroNextNoteTime - state.audioCtx.currentTime) * 1000);
    const t = setTimeout(()=>{
      if(state.metronomeOn || state.mode === "loop" || state.mode === "calibrating"){
        setBeatVisual(beatInBar);
      }
    }, visualDelay);
    state.pendingAudioTimeouts.push(t);

    state.metroNextNoteTime += metroSecondsPerBeat();
    state.metroBeatNumber++;
  }
}

async function startMetronome(){
  await ensureAudio();
  stopMetronome();

  state.metroBeatNumber = 0;
  state.metroNextNoteTime = state.audioCtx.currentTime + 0.08;
  state.metroTimerId = setInterval(metroScheduler, state.metroLookahead);
  state.metronomeOn = true;
  metroBtn.textContent = "メトロノーム停止";
}

function stopMetronome(){
  if(state.metroTimerId){
    clearInterval(state.metroTimerId);
    state.metroTimerId = null;
  }
  state.metronomeOn = false;
  metroBtn.textContent = "メトロノーム開始";
  if(state.mode !== "loop" && state.mode !== "calibrating") clearBeatVisual();
}

async function toggleMetronome(){
  if(state.metronomeOn) stopMetronome();
  else await startMetronome();
}

async function warmupAudioAndMic(){
  if(state.warmedUp){
    recordStatus.textContent = "ウォームアップ済み。";
    return;
  }

  try{
    recordStatus.textContent = "ウォームアップ中…";
    await ensureAudio();

    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();
    gain.gain.value = 0.00001;
    osc.connect(gain);
    gain.connect(state.audioCtx.destination);
    osc.start();
    osc.stop(state.audioCtx.currentTime + 0.02);

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t => t.stop());

    state.warmedUp = true;
    recordStatus.textContent = "ウォームアップ完了。";
  }catch(e){
    recordStatus.textContent = "ウォームアップ失敗。マイク許可を確認してみて。";
  }
}

async function addChordToTimeline(){
  const chord = currentChordName();
  state.slots[state.cursor] = chord;

  const root = chord.match(/^[A-G][b#]?/)[0];
  const type = chord.replace(root, "").split("/")[0];

  await playChord(root, type);
  await playBass(root);

  if(state.cursor < state.slots.length - 1){
    state.cursor++;
  }
  renderTimeline();
}

function deleteChord(){
  state.slots[state.cursor] = "-";
  renderTimeline();
}

function addBars(){
  state.slots.push("-","-","-","-");
  renderTimeline();
}

function moveLeft(){
  state.cursor = Math.max(0, state.cursor - 1);
  renderTimeline();
}

function moveRight(){
  state.cursor = Math.min(state.slots.length - 1, state.cursor + 1);
  renderTimeline();
}

async function playBarByIndex(barIndex){
  state.playingBarIndex = barIndex;
  renderTimeline();

  const chord = state.slots[barIndex];
  if(chord !== "-"){
    const root = chord.match(/^[A-G][b#]?/)[0];
    const type = chord.replace(root, "").split("/")[0];
    await playChord(root, type);
    await playBass(root);
  }
}

function clearPendingChordTimeouts(){
  if(state.pendingChordTimeouts.length){
    state.pendingChordTimeouts.forEach(id => clearTimeout(id));
    state.pendingChordTimeouts = [];
  }
}

function clearPendingAudioTimeouts(){
  if(state.pendingAudioTimeouts.length){
    state.pendingAudioTimeouts.forEach(id => clearTimeout(id));
    state.pendingAudioTimeouts = [];
  }
}

function effectiveAudioStart(){
  const autoTrim = Number(autoTrimEl.value) || 0;
  const audioOffset = Number(audioOffsetEl.value) || 0;
  return Math.max(0, autoTrim + audioOffset);
}

function stopLoop(){
  if(state.loopBarTimer){
    clearInterval(state.loopBarTimer);
    state.loopBarTimer = null;
  }

  clearPendingChordTimeouts();
  clearPendingAudioTimeouts();

  state.mode = "idle";
  state.playingBarIndex = -1;
  loopBtn.textContent = "LOOP";
  loopStatus.textContent = "LOOP停止。";

  if(!audioPlayer.paused){
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
  }

  if(!state.metronomeOn) clearBeatVisual();
  renderTimeline();
}

async function startLoop(){
  stopLoop();

  state.mode = "loop";
  state.barIndex = 0;
  loopBtn.textContent = "STOP LOOP";

  await ensureAudio();

  const beat = metroSecondsPerBeat();
  const barMs = beat * 4 * 1000;
  const chordOffset = Number(chordOffsetEl.value) || 0;
  const audioStart = effectiveAudioStart();

  const firstChordTimeout = setTimeout(()=>{
    if(state.mode !== "loop") return;
    state.barIndex = 0;
    state.cursor = 0;
    playBarByIndex(0);
    setBeatVisual(0);
  }, Math.max(0, chordOffset * 1000));
  state.pendingChordTimeouts.push(firstChordTimeout);

  if(audioPlayer.src){
    const firstAudioTimeout = setTimeout(async ()=>{
      if(state.mode !== "loop") return;
      try{
        audioPlayer.pause();
        audioPlayer.currentTime = audioStart;
        await audioPlayer.play();
        loopStatus.textContent = "コード基準で録音 + コード同期再生中。";
      }catch(e){
        loopStatus.textContent = "コード再生中。録音は手動再生が必要かも。";
      }
    }, Math.max(0, chordOffset * 1000));
    state.pendingAudioTimeouts.push(firstAudioTimeout);
  }else{
    loopStatus.textContent = "コード再生中。録音はまだ無し。";
  }

  state.loopBarTimer = setInterval(()=>{
    state.barIndex = (state.barIndex + 1) % state.slots.length;

    const t = setTimeout(()=>{
      if(state.mode !== "loop") return;
      state.cursor = state.barIndex;
      playBarByIndex(state.barIndex);
      setBeatVisual(0);
    }, Math.max(0, chordOffset * 1000));

    state.pendingChordTimeouts.push(t);
  }, barMs);
}

function toggleLoop(){
  if(state.mode === "loop") stopLoop();
  else startLoop();
}

async function startRecording(){
  if(state.mode === "recording" || state.mode === "calibrating") return;

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    recordStatus.textContent = "このブラウザでは録音APIが使えないみたい。";
    return;
  }

  try{
    await ensureAudio();

    recordStatus.textContent = "録音開始中…";
    state.mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});

    state.recordedChunks = [];
    state.mediaRecorder = new MediaRecorder(state.mediaStream);

    state.mediaRecorder.ondataavailable = (e)=>{
      if(e.data && e.data.size > 0){
        state.recordedChunks.push(e.data);
      }
    };

    state.mediaRecorder.onstop = ()=>{
      state.recordedBlob = new Blob(
        state.recordedChunks,
        { type: state.mediaRecorder.mimeType || "audio/webm" }
      );

      audioPlayer.src = URL.createObjectURL(state.recordedBlob);

      if(state.mediaStream){
        state.mediaStream.getTracks().forEach(t => t.stop());
      }

      state.mediaStream = null;
      state.mediaRecorder = null;
      state.mode = "idle";

      recordStatus.textContent = "録音できた。必要なら「録音を保存」でダウンロード。";
    };

    state.mediaRecorder.start();
    state.mode = "recording";
    recordStatus.textContent = "録音中…「録音停止」で止める。";

  }catch(err){
    state.mode = "idle";

    if(state.mediaStream){
      state.mediaStream.getTracks().forEach(t => t.stop());
      state.mediaStream = null;
    }

    state.mediaRecorder = null;
    recordStatus.textContent = "録音開始に失敗。マイク許可を確認してみて。";
  }
}

function stopRecording(){
  if(state.mode !== "recording" || !state.mediaRecorder) return;
  recordStatus.textContent = "停止中…";
  state.mediaRecorder.stop();
}

function downloadRecording(){
  if(!state.recordedBlob) return;

  const a = document.createElement("a");
  a.href = URL.createObjectURL(state.recordedBlob);
  a.download = "hook-recording.webm";
  a.click();
}

// ---- calibration ----
async function decodeBlobToBuffer(blob){
  const arrayBuffer = await blob.arrayBuffer();
  const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
  const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer.slice(0));
  await tempCtx.close();
  return audioBuffer;
}

function suggestTrimFromBuffer(audioBuffer){
  const channel = audioBuffer.getChannelData(0);
  const sampleRate = audioBuffer.sampleRate;

  let max = 0;
  for(let i = 0; i < channel.length; i++){
    const v = Math.abs(channel[i]);
    if(v > max) max = v;
  }

  const threshold = Math.max(0.03, max * 0.18);

  let hitIndex = -1;
  for(let i = 0; i < channel.length; i++){
    if(Math.abs(channel[i]) >= threshold){
      hitIndex = i;
      break;
    }
  }

  if(hitIndex < 0) return null;

  const seconds = hitIndex / sampleRate;
  const rounded = Math.max(0, Math.round(seconds * 100) / 100);
  return rounded;
}

async function runCalibration(){
  if(state.mode === "recording" || state.mode === "loop" || state.mode === "calibrating") return;

  try{
    await ensureAudio();

    state.mode = "calibrating";
    recordStatus.textContent = "キャリブ中… 4拍クリックを録音してる。";

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    state.mediaStream = stream;
    state.recordedChunks = [];
    state.mediaRecorder = new MediaRecorder(stream);

    state.mediaRecorder.ondataavailable = (e)=>{
      if(e.data && e.data.size > 0){
        state.recordedChunks.push(e.data);
      }
    };

    state.mediaRecorder.onstop = async ()=>{
      try{
        state.calibrationBlob = new Blob(
          state.recordedChunks,
          { type: state.mediaRecorder.mimeType || "audio/webm" }
        );
        calAudioPlayer.src = URL.createObjectURL(state.calibrationBlob);

        const buffer = await decodeBlobToBuffer(state.calibrationBlob);
        const suggested = suggestTrimFromBuffer(buffer);

        if(suggested == null){
          calResult.textContent = "推奨トリム: 検出失敗";
        }else{
          state.calibrationSuggestedTrim = suggested;
          calResult.textContent = `推奨トリム: ${suggested.toFixed(2)} 秒`;
        }

        recordStatus.textContent = "キャリブ完了。推奨値を適用できる。";
      }catch(err){
        calResult.textContent = "推奨トリム: 解析失敗";
        recordStatus.textContent = "キャリブ解析に失敗。";
      }finally{
        if(state.mediaStream){
          state.mediaStream.getTracks().forEach(t => t.stop());
        }
        state.mediaStream = null;
        state.mediaRecorder = null;
        state.mode = "idle";
        if(!state.metronomeOn) clearBeatVisual();
      }
    };

    state.mediaRecorder.start();

    const beat = metroSecondsPerBeat();
    const startAt = state.audioCtx.currentTime + 0.10;

    for(let i = 0; i < 4; i++){
      scheduleClick(startAt + i * beat, i === 0);
      const delay = Math.max(0, (startAt + i * beat - state.audioCtx.currentTime) * 1000);
      const t = setTimeout(()=>setBeatVisual(i), delay);
      state.pendingAudioTimeouts.push(t);
    }

    const stopDelayMs = Math.max(0, ((startAt + (beat * 4) + 0.5) - state.audioCtx.currentTime) * 1000);
    const stopTimer = setTimeout(()=>{
      if(state.mediaRecorder && state.mode === "calibrating"){
        state.mediaRecorder.stop();
      }
    }, stopDelayMs);
    state.pendingAudioTimeouts.push(stopTimer);

  }catch(err){
    state.mode = "idle";
    if(state.mediaStream){
      state.mediaStream.getTracks().forEach(t => t.stop());
      state.mediaStream = null;
    }
    state.mediaRecorder = null;
    recordStatus.textContent = "キャリブ失敗。マイク許可を確認してみて。";
  }
}

function applyCalibration(){
  if(state.calibrationSuggestedTrim == null) return;
  autoTrimEl.value = state.calibrationSuggestedTrim.toFixed(2);
  recordStatus.textContent = `推奨トリム ${state.calibrationSuggestedTrim.toFixed(2)} 秒 を適用した。`;
}
// ---- end calibration ----

typeSel.onchange = ()=>{ playChord(rootSel.value, typeSel.value); };
