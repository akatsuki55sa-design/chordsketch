<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookPad v6.4</title>

<style>

body{
font-family:sans-serif;
background:#0d1b2a;
color:white;
padding:20px;
}

.panel{
background:#1b263b;
padding:16px;
border-radius:12px;
margin-bottom:16px;
}

button{
background:#415a77;
color:white;
border:none;
padding:12px 14px;
margin:6px;
border-radius:8px;
font-size:14px;
}

button:hover{
background:#778da9;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
background:#0d1b2a;
border:1px solid #415a77;
color:white;
border-radius:6px;
}

.quickChordBtn{
width:60px;
}

</style>
</head>

<body>

<h1>HookPad v6.4</h1>

<div class="panel">

<h2>フック録音</h2>

<button id="recordBtn">録音開始</button>
<button id="stopBtn">録音停止</button>

<br><br>

BPM
<input id="bpm" value="120">

自動トリム(秒)
<input id="trim" value="2.4">

<audio id="player" controls></audio>

</div>

<div class="panel">

<h2>クイックコード</h2>

<div id="quickChordGrid">

<button class="quickChordBtn" data-chord="C">C</button>
<button class="quickChordBtn" data-chord="Dm">Dm</button>
<button class="quickChordBtn" data-chord="Em">Em</button>
<button class="quickChordBtn" data-chord="F">F</button>
<button class="quickChordBtn" data-chord="G">G</button>
<button class="quickChordBtn" data-chord="Am">Am</button>

</div>

</div>

<div class="panel">

<h2>コード進行</h2>

<div id="chordTimeline"></div>

<button id="playChord">▶</button>
<button id="loopChord">LOOP</button>
<button id="stopChord">STOP</button>

</div>

<script>

let audioContext=new(window.AudioContext||window.webkitAudioContext)()

let recorder
let recordedBlob

let chords=[]
let loop=false
let loopTimer=null

document.getElementById("recordBtn").onclick=async()=>{

let stream=await navigator.mediaDevices.getUserMedia({audio:true})

recorder=new MediaRecorder(stream)

let chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

recordedBlob=new Blob(chunks)

let url=URL.createObjectURL(recordedBlob)

document.getElementById("player").src=url

}

recorder.start()

}

document.getElementById("stopBtn").onclick=()=>{

recorder.stop()

}

document.querySelectorAll(".quickChordBtn").forEach(btn=>{

btn.onclick=()=>{

let chord=btn.dataset.chord

chords.push(chord)

renderChords()

}

})

function renderChords(){

let area=document.getElementById("chordTimeline")

area.innerHTML=""

chords.forEach((c,i)=>{

let b=document.createElement("button")

b.innerText=c+" / "+(i+1)+"小節"

area.appendChild(b)

})

}

function playChord(chord){

let osc=audioContext.createOscillator()

let gain=audioContext.createGain()

osc.type="sine"

gain.gain.value=0.15

osc.connect(gain)
gain.connect(audioContext.destination)

let freq=261

if(chord=="C")freq=261
if(chord=="Dm")freq=293
if(chord=="Em")freq=329
if(chord=="F")freq=349
if(chord=="G")freq=392
if(chord=="Am")freq=440

osc.frequency.value=freq

osc.start()

setTimeout(()=>{

osc.stop()

},400)

}

function startChordLoop(){

let bpm=parseFloat(document.getElementById("bpm").value)

let beat=60/bpm

let measure=beat*4

let i=0

loopTimer=setInterval(()=>{

let chord=chords[i]

playChord(chord)

i++

if(i>=chords.length){

if(loop){

i=0

}else{

clearInterval(loopTimer)

}

}

},measure*1000)

}

document.getElementById("playChord").onclick=()=>{

loop=false

startChordLoop()

}

document.getElementById("loopChord").onclick=()=>{

loop=true

startChordLoop()

}

document.getElementById("stopChord").onclick=()=>{

clearInterval(loopTimer)

}

</script>

</body>
</html>
