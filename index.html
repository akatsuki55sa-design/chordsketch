<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSketch v4</title>
<style>
:root{
  --bg:#081226;
  --panel:#0f1b33;
  --panel2:#182640;
  --line:#31435f;
  --text:#e8eefc;
  --muted:#9fb0d1;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#081226;
  color:var(--text);
}
.app{
  max-width:860px;
  margin:0 auto;
  padding:16px;
}
.panel{
  background:rgba(15,27,51,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}
h1{
  margin:0 0 6px;
  font-size:1.8rem;
}
p{
  margin:0 0 12px;
  color:var(--muted);
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
button,input,select,textarea{
  font:inherit;
}
button{
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#1b2b47;
  color:white;
}
button:active{
  transform:scale(.99);
}
input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  color:white;
}
textarea{
  min-height:90px;
}
.timeline{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}
.slot{
  min-width:110px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#182640;
  text-align:center;
}
.status{
  margin-top:10px;
  padding:10px 12px;
  border-radius:12px;
  background:#182640;
  color:var(--muted);
}
audio{
  width:100%;
  margin-top:10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <h1>ChordSketch v4</h1>
  <p>録音・コード・クリックを同期して鳴らす版。</p>

  <div class="panel">
    <h2 style="margin:0 0 12px;">フック録音</h2>

    <div class="row">
      <button id="startRecBtn" type="button">録音開始</button>
      <button id="stopRecBtn" type="button">録音停止</button>
      <button id="downloadRecBtn" type="button">録音を保存</button>
    </div>

    <div style="margin-top:12px;">
      <label>曲名 / メモ名</label>
      <input id="projectName" placeholder="例：新曲サビ候補A">
    </div>

    <div style="margin-top:12px;">
      <label>BPM</label>
      <input id="bpm" type="number" value="110" min="40" max="240">
    </div>

    <div style="margin-top:12px;">
      <label>
        <input id="clickToggle" type="checkbox" checked style="width:auto;margin-right:8px;">
        クリック音を鳴らす
      </label>
    </div>

    <div class="status" id="recordStatus">「録音開始」で始めて、「録音停止」で止める。</div>
    <audio id="audioPlayer" controls></audio>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード進行</h2>
    <div class="timeline" id="timeline"></div>
    <div class="row">
      <button id="leftBtn" type="button">◀</button>
      <button id="rightBtn" type="button">▶</button>
      <button id="deleteBtn" type="button">⌫</button>
      <button id="addBarsBtn" type="button">+4</button>
      <button id="loopBtn" type="button">LOOP</button>
    </div>
    <div class="status" id="loopStatus">LOOPで録音・コード・クリックを同期再生する。</div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">コード入力</h2>
    <div class="grid">
      <select id="root"></select>
      <select id="type"></select>
      <select id="slash"></select>
    </div>
    <div class="row" style="margin-top:12px;">
      <button id="addChordBtn" type="button">追加</button>
      <button id="previewBtn" type="button">試聴</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin:0 0 12px;">歌詞メモ</h2>
    <textarea id="lyrics" placeholder="仮歌詞 / フレーズ / 連想ワード"></textarea>
  </div>
</div>
