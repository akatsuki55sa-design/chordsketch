<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HookPad v12</title>
<style>
body{margin:0;background:#081226;color:#e8eefc;font-family:sans-serif}
.container{padding:12px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
button,select,input{padding:8px;border-radius:8px;background:#182640;color:white;border:1px solid #31435f}
.timeline-wrap{overflow:auto;border:1px solid #31435f}
.timeline{position:relative;height:300px}
.track{height:100px;border-bottom:1px solid rgba(255,255,255,.1)}
.playhead{position:absolute;width:2px;background:red;top:0;bottom:0}
.chord{position:absolute;height:30px;background:#8dd7ff;border-radius:6px;padding:2px 6px;font-size:12px}
</style>
</head>
<body>
<div class="container">

<div class="controls">
<button id="play">▶</button>
<button id="rec">●</button>

<label>BPM <input id="bpm" type="number" value="120"></label>

<label>拍子
<select id="sig">
<option value="4">4/4</option>
<option value="3">3/4</option>
<option value="6">6/8</option>
</select>
</label>

<label>コード長
<select id="len">
<option value="1">1拍</option>
<option value="2">2拍</option>
<option value="4">1小節</option>
<option value="8">2小節</option>
</select>
</label>

<button id="addChord">コード追加</button>
</div>

<div class="timeline-wrap" id="wrap">
<div class="timeline" id="timeline">
<div class="track"></div>
<div class="playhead" id="playhead"></div>
</div>
</div>

</div>

<script>
const wrap = document.getElementById("wrap");
const timeline = document.getElementById("timeline");
const playhead = document.getElementById("playhead");

let bpm = 120;
let beatsPerBar = 4;
let pxPerBeat = 80;
let currentTime = 0;
let dragging = false;

function secPerBeat(){return 60/bpm}
function timeToX(t){return (t/secPerBeat())*pxPerBeat}
function xToTime(x){return (x/pxPerBeat)*secPerBeat()}

// 🔥 ここが修正ポイント（ズレ解消）
function getAccurateX(e){
const rect = timeline.getBoundingClientRect();
return e.clientX - rect.left + wrap.scrollLeft;
}

function updatePlayhead(){
playhead.style.left = timeToX(currentTime)+"px";
}

timeline.addEventListener("pointerdown",e=>{
dragging = true;
move(e);
});

window.addEventListener("pointermove",e=>{
if(!dragging)return;
move(e);
});

window.addEventListener("pointerup",()=>{
dragging=false;
});

function move(e){
const x = getAccurateX(e);
currentTime = xToTime(x);
updatePlayhead();
}

// コード追加
document.getElementById("addChord").onclick=()=>{
const lenBeat = Number(document.getElementById("len").value);
const startX = timeToX(currentTime);
const width = lenBeat*pxPerBeat;

const el = document.createElement("div");
el.className="chord";
el.style.left = startX+"px";
el.style.width = width+"px";
el.textContent="C";

timeline.appendChild(el);
};

// BPM
document.getElementById("bpm").oninput=e=>{
bpm = Number(e.target.value);
};

// 拍子
document.getElementById("sig").onchange=e=>{
beatsPerBar = Number(e.target.value);
};

updatePlayhead();
</script>
</body>
</html>
